
<style>

.sb-inputs{padding:0 8px 16px}
.inp-group{margin-bottom:12px}

.inp-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px}

.inp-label{font-size:12px;color:#3a3a3c;flex:1}
.inp-val{display:flex;align-items:center;gap:4px}
.inp-val input{width:72px;padding:3px 6px;border:1px solid #c9c5be;border-radius:5px;font-size:11px;text-align:right;background:#f5f2ed;color:#0000bb;font-weight:500}

.tab:hover{color:#3a3a3c}

.content{flex:1;padding:20px 24px;overflow-y:auto}
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}

.kbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;margin-bottom:8px}
.kg{background:#e3f9e5;color:#1a7f37}.ky{background:#fff3cd;color:#856404}.kr{background:#fde8e8;color:#b91c1c}
.kcard-label{font-size:11px;color:#8e8e93;margin-bottom:3px}
.kcard-val{font-size:20px;font-weight:700;letter-spacing:-.3px}
.kcard-sub{font-size:10px;color:#8e8e93;margin-top:2px}
.section-label{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.block{background:white;border-radius:12px;padding:14px 16px;border:1px solid #e0dcd6}
.block-title{font-size:11px;font-weight:600;color:#ff6b35;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0ede8}
.brow{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:12px;border-bottom:1px solid #f7f5f2}
.brow:last-child{border-bottom:none}

.brow.bm{color:#8e8e93}
.brow span:last-child{font-weight:500}
.cf-box{background:white;border-radius:12px;border:1px solid #e0dcd6;overflow:hidden;max-width:420px;margin-bottom:20px}
.cfr{display:flex;justify-content:space-between;padding:9px 16px;border-bottom:1px solid #f7f5f2;font-size:12px}
.cfr:last-child{border-bottom:none}
.cft{font-weight:600;font-size:13px}
.gv{color:#1a7f37;font-weight:600}.rv{color:#b91c1c;font-weight:600}.yv{color:#856404;font-weight:600}
.disc{font-size:10px;color:#8e8e93;margin-top:12px}
.fin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}

.tbl .paid{color:#1a7f37;font-weight:600}
@media(max-width:720px){.shell{flex-direction:column}.sidebar{width:100%;min-width:0;flex-direction:row;overflow-x:auto}.sb-inputs{display:none}.kgrid,.row3{grid-template-columns:1fr 1fr}.fin-grid{grid-template-columns:1fr}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const S={
  adresse:'',kaufjahr:2025,kaufpreis:200000,wohnflaeche:60,anfInvest:0,
  makler:3.57,notar:1.5,grundbuch:0.5,grunderwerb:6.5,sonst:0,
  mietePqm:8,stellplatz:0,mietausfall:3,ruecklage:1,
  hausgeldU:150,hausgeldN:80,grundsteuer:50,sonstverwalt:0,
  darlehenIA:90,zinssatzI:3.5,tilgungI:2,
  darlehenII:0,zinssatzII:4,tilgungII:2,
  afa:2,gebaude:75,steuer:42,
  wertst:2,mietst:2,kostst:2,betrjahr:2050
};

const GROUPS=[
  {label:'Objekt',fields:[
    {k:'kaufpreis',l:'Kaufpreis',u:'€',s:1000},
    {k:'wohnflaeche',l:'Wohnfläche',u:'m²',s:1},
    {k:'anfInvest',l:'Investitionen',u:'€',s:500}
  ]},
  {label:'Nebenkosten',fields:[
    {k:'makler',l:'Makler',u:'%',s:0.01},
    {k:'notar',l:'Notar',u:'%',s:0.01},
    {k:'grunderwerb',l:'Grunderwerb',u:'%',s:0.01}
  ]},
  {label:'Miete',fields:[
    {k:'mietePqm',l:'Kaltmiete/m²',u:'€',s:0.5},
    {k:'mietausfall',l:'Mietausfall',u:'%',s:0.5},
    {k:'hausgeldN',l:'Hausgeld',u:'€',s:10},
    {k:'grundsteuer',l:'Grundsteuer',u:'€',s:5}
  ]},
  {label:'Finanzierung',fields:[
    {k:'darlehenIA',l:'Darlehen I',u:'%',s:1},
    {k:'zinssatzI',l:'Zinssatz I',u:'%',s:0.1},
    {k:'tilgungI',l:'Tilgung I',u:'%',s:0.1}
  ]},
  {label:'Steuern',fields:[
    {k:'afa',l:'AfA-Satz',u:'%',s:0.1},
    {k:'gebaude',l:'Gebäudeanteil',u:'%',s:1},
    {k:'steuer',l:'Grenzsteuersatz',u:'%',s:1}
  ]},
  {label:'Prognose',fields:[
    {k:'betrjahr',l:'Betrachtungsjahr',u:'',s:1},
    {k:'wertst',l:'Wertsteigerung',u:'%',s:0.1},
    {k:'mietst',l:'Mietsteigerung',u:'%',s:0.1}
  ]}
];

function buildSidebar(){
  const sb=document.getElementById('sb-inputs');
  sb.innerHTML='';
  GROUPS.forEach(g=>{
    const gt=document.createElement('div');gt.className='inp-group';
    const title=document.createElement('div');title.className='inp-group-title';title.textContent=g.label;gt.appendChild(title);
    g.fields.forEach(f=>{
      const row=document.createElement('div');row.className='inp-row';
      const lbl=document.createElement('span');lbl.className='inp-label';lbl.textContent=f.l;
      const wrap=document.createElement('div');wrap.className='inp-val';
      const inp=document.createElement('input');inp.type='number';inp.value=S[f.k];inp.step=f.s||1;
      inp.oninput=e=>{S[f.k]=parseFloat(e.target.value)||0;recalc()};
      const unit=document.createElement('span');unit.textContent=f.u;
      wrap.appendChild(inp);wrap.appendChild(unit);
      row.appendChild(lbl);row.appendChild(wrap);gt.appendChild(row);
    });
    sb.appendChild(gt);
  });
}

const p=v=>v/100;
function ann(d,z,t){if(d<=0)return{rate:0,zinsen:0,tilgung:0};const zm=z/12,r=d*(zm+t/12),zi=d*zm,ti=r-zi;return{rate:r,zinsen:zi,tilgung:ti}}
function tilgPlan(d,z,t,j=50){if(d<=0)return[];const zm=z/12,r=d*(zm+t/12);let rs=d;const pl=[];for(let i=1;i<=j;i++){let zj=0,tj=0;for(let m=0;m<12;m++){if(rs<=0)break;const zi=rs*zm,ti=Math.min(r-zi,rs);zj+=zi;tj+=ti;rs-=ti;}pl.push({j:i,zj,tj,ann:zj+tj,rs:Math.max(0,rs),kdm:(zj+tj)/12});if(rs<=0)break;}return pl}
function proj(kp,nkm,bk,dG,z,t,jahre){const tp=tilgPlan(dG,z,t,50);const d=[];for(let j=0;j<=jahre;j++){const wert=kp*Math.pow(1+p(S.wertst),j),miete=nkm*Math.pow(1+p(S.mietst),j),kosten=bk*Math.pow(1+p(S.kostst||2),j),row=tp[j]||tp[tp.length-1]||{rs:0,zj:0,tj:0},rs=row.rs,zi=row.zj/12,ti=row.tj/12,afaM=(kp*p(S.gebaude)*p(S.afa))/12,zvs=miete-kosten-zi-afaM,st=zvs*p(S.steuer),cf=miete-kosten-zi-ti-st;d.push({j,yr:S.kaufjahr+j,wert,rs,nv:wert-rs,miete,kosten,cf});}return d}

function calcAll(){
  const kp=S.kaufpreis,wf=S.wohnflaeche;
  const nkGes=kp*(p(S.makler)+p(S.notar)+p(S.grundbuch)+p(S.grunderwerb)+p(S.sonst));
  const nkObj={makler:kp*p(S.makler),notar:kp*p(S.notar),grundbuch:kp*p(S.grundbuch),grunderwerb:kp*p(S.grunderwerb),sonst:kp*p(S.sonst),gesamt:nkGes};
  const gI=kp+nkGes+S.anfInvest,dI=kp*p(S.darlehenIA),dII=S.darlehenII,dG=dI+dII,ek=gI-dG;
  const fI=ann(dI,p(S.zinssatzI),p(S.tilgungI)),fII=ann(dII,p(S.zinssatzII),p(S.tilgungII));
  const kd=fI.rate+fII.rate,zi=fI.zinsen+fII.zinsen,ti=fI.tilgung+fII.tilgung;
  const nkm=S.mietePqm*wf,mao=nkm*p(S.mietausfall),nkmE=nkm-mao;
  const bk=S.hausgeldN+S.sonstverwalt+(S.ruecklage*wf/12)+mao;
  const afaM=(kp*p(S.gebaude)*p(S.afa))/12,zvs=nkmE-bk-zi-afaM,stM=zvs*p(S.steuer);
  const cfOp=nkmE-bk-zi-ti,cfNSt=cfOp-stM;
  const bR=kp>0?(nkm*12)/kp:0,nR=gI>0?((nkmE-bk)*12)/gI:0,fakt=nkm>0?kp/(nkm*12):0;
  const tplan=tilgPlan(dI,p(S.zinssatzI),p(S.tilgungI),50);
  const jahre=Math.max(1,S.betrjahr-S.kaufjahr);
  const prj=proj(kp,nkmE,bk,dG,(dI*p(S.zinssatzI)+dII*p(S.zinssatzII))/(dG||1),(dI*p(S.tilgungI)+dII*p(S.tilgungII))/(dG||1),jahre);
  return{nkObj,nkGes,gI,dI,dII,dG,ek,fI,fII,kd,zi,ti,nkm,mao,nkmE,bk,afaM,stM,cfOp,cfNSt,bR,nR,fakt,tplan,prj};
}

const eu=v=>new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
const pf=(v,d=2)=>(v*100).toFixed(d)+'%';
function amp(v,sw){return v>=sw[0]?'kg':v>=sw[1]?'ky':'kr'}
const SW={bm:[0.06,0.05],nm:[0.05,0.04],cf:[100,0],fk:[20,25]};
function famp(v){return v<=SW.fk[0]?'kg':v<=SW.fk[1]?'ky':'kr'}
const ALBL={kg:'Gut',ky:'Ok',kr:'Kritisch'};
const ACOL={kg:'#1a7f37',ky:'#856404',kr:'#b91c1c'};

function kc(label,val,a,sub){
  return`<div class="kcard"><span class="kbadge ${a}">${ALBL[a]}</span><div class="kcard-label">${label}</div><div class="kcard-val" style="color:${ACOL[a]}">${val}</div>${sub?`<div class="kcard-sub">${sub}</div>`:''}</div>`;
}
function br(l,v,cls=''){return`<div class="brow ${cls}"><span>${l}</span><span>${v}</span></div>`}
function cfr(l,v){return`<div class="cfr"><span>${l}</span><span class="${v>=0?'gv':'rv'}">${eu(v)}</span></div>`}
function cfrt(l,v,a){return`<div class="cfr cft" style="background:${a==='kg'?'#f0faf1':a==='ky'?'#fffbeb':'#fef2f2'}"><span>${l}</span><span style="color:${ACOL[a]}">${eu(v)}</span></div>`}
function fr(l,v,h=false){return`<div class="brow${h?' bb':''}"><span>${l}</span><span>${v}</span></div>`}

function buildCockpit(c){
  return`
<div class="section-label">Kennzahlen</div>
<div class="kgrid">
  ${kc('Bruttomietrendite',pf(c.bR),amp(c.bR,SW.bm),'Kaltmiete / Kaufpreis')}
  ${kc('Nettomietrendite',pf(c.nR),amp(c.nR,SW.nm),'nach Bewirtschaftung')}
  ${kc('Kaufpreisfaktor',c.fakt.toFixed(1)+'x',famp(c.fakt),'KP / Jahreskaltmiete')}
  ${kc('Cashflow operativ',eu(c.cfOp)+'/Mo.',amp(c.cfOp,SW.cf),'vor Steuern')}
  ${kc('Cashflow n. Steuern',eu(c.cfNSt)+'/Mo.',amp(c.cfNSt,SW.cf),'nach AfA & Steuern')}
  ${kc('Monatl. AfA',eu(c.afaM),'kg','steuerliche Absetzung')}
</div>
<div class="section-label">Übersicht</div>
<div class="row3">
  <div class="block"><div class="block-title">Investition</div>
    ${br('Kaufpreis',eu(S.kaufpreis))}${br('Nebenkosten',eu(c.nkGes),'bm')}${br('Anfängl. Investitionen',eu(S.anfInvest),'bm')}${br('Gesamtinvestition',eu(c.gI),'bb')}${br('Kaufpreis/m²',eu(S.kaufpreis/(S.wohnflaeche||1)),'bm')}
  </div>
  <div class="block"><div class="block-title">Miete & Bewirtschaftung</div>
    ${br('Kaltmiete/m²',S.mietePqm.toFixed(2)+' €')}${br('Nettokaltmiete',eu(c.nkm)+'/Mo.')}${br('– Mietausfall','-'+eu(c.mao)+'/Mo.','bm')}${br('Nettokaltmiete eff.',eu(c.nkmE)+'/Mo.','bb')}${br('Bewirtschaftung','–'+eu(c.bk)+'/Mo.','bm')}
  </div>
  <div class="block"><div class="block-title">Finanzierung</div>
    ${br('Gesamtdarlehen',eu(c.dG))}${br('Eigenkapital',eu(c.ek),'bb')}${br('EK-Anteil',pf(c.ek/(c.gI||1)),'bm')}${br('Kapitaldienst',eu(c.kd)+'/Mo.','bb')}${br('davon Zinsen',eu(c.zi)+'/Mo.','bm')}${br('davon Tilgung',eu(c.ti)+'/Mo.','bm')}
  </div>
</div>
<div class="section-label">Monatlicher Cashflow</div>
<div class="cf-box">
  ${cfr('Nettokaltmiete (effektiv)',c.nkmE)}
  ${cfr('– Bewirtschaftungskosten',-c.bk)}
  ${cfr('– Zinsen',-c.zi)}
  ${cfr('– Tilgung',-c.ti)}
  ${cfrt('= Cashflow operativ',c.cfOp,amp(c.cfOp,SW.cf))}
  ${cfr('– Steuern',-c.stM)}
  ${cfrt('= Cashflow nach Steuern',c.cfNSt,amp(c.cfNSt,SW.cf))}
</div>
<div class="disc">Keine Gewähr für Richtigkeit. Kein Ersatz für Rechts-, Steuer- oder Finanzberatung.</div>`;
}

function buildFin(c){
  function fc(title,color,content){return`<div class="block" style="border-top:3px solid ${color}"><div class="block-title" style="color:${color}">${title}</div>${content}</div>`}
  return`<div class="fin-grid">
  ${fc('Darlehen I (Hauptdarlehen)','#ff6b35',fr('Darlehenssumme',eu(c.dI))+fr('Zinssatz',pf(p(S.zinssatzI)))+fr('Anfäng. Tilgung',pf(p(S.tilgungI)))+fr('Monatl. Rate',eu(c.fI.rate),true)+fr('davon Zinsen',eu(c.fI.zinsen))+fr('davon Tilgung',eu(c.fI.tilgung)))}
  ${c.dII>0?fc('Darlehen II','#5856d6',fr('Darlehenssumme',eu(c.dII))+fr('Zinssatz',pf(p(S.zinssatzII)))+fr('Anfäng. Tilgung',pf(p(S.tilgungII)))+fr('Monatl. Rate',eu(c.fII.rate),true)+fr('davon Zinsen',eu(c.fII.zinsen))+fr('davon Tilgung',eu(c.fII.tilgung))):''}
  ${fc('Eigenkapital & Gesamtfinanzierung','#34c759',fr('Gesamtinvestition',eu(c.gI))+fr('Gesamtdarlehen',eu(c.dG))+fr('Eigenkapital',eu(c.ek),true)+fr('EK-Anteil',pf(c.ek/(c.gI||1)))+fr('Gesamt-Kapitaldienst',eu(c.kd),true))}
  ${fc('Nebenkosten','#8e8e93',fr('Makler',eu(c.nkObj.makler))+fr('Notar',eu(c.nkObj.notar))+fr('Grundbuchamt',eu(c.nkObj.grundbuch))+fr('Grunderwerbsteuer',eu(c.nkObj.grunderwerb))+fr('Summe Nebenkosten',eu(c.nkGes),true)+fr('in % Kaufpreis',pf(c.nkGes/(S.kaufpreis||1))))}
</div>`;
}

let charts={};
function buildCharts(c){
  return`
<div class="chart-wrap"><div class="chart-title">Wertentwicklung & Restschuld</div><div style="position:relative;width:100%;height:260px"><canvas id="cW"></canvas></div></div>
<div class="chart-wrap"><div class="chart-title">Cashflow-Entwicklung (monatlich, nach Steuern)</div><div style="position:relative;width:100%;height:260px"><canvas id="cC"></canvas></div></div>`;
}
function renderCharts(c){
  ['cW','cC'].forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id]}});
  const pr=c.prj,lb=pr.map(d=>d.yr);
  const opt={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11},color:'#3a3a3c'}}},scales:{x:{ticks:{font:{size:10},maxTicksLimit:10,color:'#8e8e93'},grid:{color:'#f0ede8'}},y:{ticks:{font:{size:10},color:'#8e8e93',callback:v=>(v/1000).toFixed(0)+'k €'},grid:{color:'#f0ede8'}}}};
  const cW=document.getElementById('cW'),cC=document.getElementById('cC');
  if(!cW||!cC)return;
  charts.cW=new Chart(cW,{type:'line',data:{labels:lb,datasets:[
    {label:'Immobilienwert',data:pr.map(d=>Math.round(d.wert)),borderColor:'#ff6b35',borderWidth:2,pointRadius:0,tension:.3},
    {label:'Restschuld',data:pr.map(d=>Math.round(d.rs)),borderColor:'#ff3b30',borderWidth:2,pointRadius:0,tension:.3,borderDash:[4,3]},
    {label:'Nettovermögen',data:pr.map(d=>Math.round(d.nv)),borderColor:'#34c759',borderWidth:2,pointRadius:0,tension:.3}
  ]},options:{...opt}});
  const opt2=JSON.parse(JSON.stringify(opt));opt2.scales.y.ticks.callback=v=>eu(v);
  charts.cC=new Chart(cC,{type:'line',data:{labels:lb,datasets:[
    {label:'Miete',data:pr.map(d=>Math.round(d.miete)),borderColor:'#5856d6',borderWidth:1.5,pointRadius:0,tension:.3},
    {label:'Cashflow n. Steuern',data:pr.map(d=>Math.round(d.cf)),borderColor:'#34c759',borderWidth:2,pointRadius:0,tension:.3}
  ]},options:{...opt2}});
}

function buildTilgung(c){
  let rows='';
  c.tplan.forEach(r=>{const paid=r.rs<=0;rows+=`<tr><td>${S.kaufjahr+r.j-1}</td><td>${eu(r.zj)}</td><td>${eu(r.tj)}</td><td>${eu(r.ann)}</td><td class="${paid?'paid':''}">${paid?'✓ abbezahlt':eu(r.rs)}</td><td>${eu(r.kdm)}</td></tr>`;});
  return`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Jahr</th><th>Zinsen p.a.</th><th>Tilgung p.a.</th><th>Annuität p.a.</th><th>Restschuld (Ende)</th><th>KD/Monat</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

let activeTabId='cockpit';
function showTab(id,navEl,tabEl){
  activeTabId=id;
  ['cockpit','finanzierung','charts','tilgung'].forEach(t=>document.getElementById('tab-'+t).style.display=t===id?'block':'none');
  if(navEl){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));navEl.classList.add('active')}
  if(tabEl){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tabEl.classList.add('active')}
  const titles={cockpit:'Cockpit',finanzierung:'Finanzierung',charts:'Charts',tilgung:'Tilgungsplan'};
  document.getElementById('page-title').textContent=titles[id];
  if(id==='charts'){const c=calcAll();document.getElementById('tab-charts').innerHTML=buildCharts(c);setTimeout(()=>renderCharts(c),60)}
}

function recalc(){
  const c=calcAll();
  if(activeTabId==='cockpit')document.getElementById('tab-cockpit').innerHTML=buildCockpit(c);
  else if(activeTabId==='finanzierung')document.getElementById('tab-finanzierung').innerHTML=buildFin(c);
  else if(activeTabId==='charts'){document.getElementById('tab-charts').innerHTML=buildCharts(c);setTimeout(()=>renderCharts(c),60)}
  else if(activeTabId==='tilgung')document.getElementById('tab-tilgung').innerHTML=buildTilgung(c);
}

buildSidebar();
const c=calcAll();
document.getElementById('tab-cockpit').innerHTML=buildCockpit(c);
</script>


<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;font-size:13px;background:#f0ede8;color:#2c2c2e;min-height:100vh}
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#eae7e1;border-bottom:1px solid #d6d2cb;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{display:flex;align-items:baseline;gap:10px;padding:14px 0}
.topbar-logo{font-size:16px;font-weight:700;color:#2c2c2e;letter-spacing:-.3px}
.topbar-obj{font-size:12px;color:#8e8e93}
.tab-bar{display:flex}
.tab{padding:14px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#8e8e93;transition:all .12s;user-select:none;white-space:nowrap}
.tab:hover{color:#3a3a3c}
.tab.active{color:#ff6b35;border-bottom-color:#ff6b35;font-weight:600}
.content{flex:1;padding:20px 24px}

/* cockpit top row: kennzahlen + cashflow side by side */
.cockpit-top{display:grid;grid-template-columns:1fr 280px;gap:14px;margin-bottom:20px;align-items:start}
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kcard{background:white;border-radius:10px;padding:10px 12px;border:1px solid #e0dcd6;display:flex;align-items:center;gap:10px}
.kcard-left{flex:1;min-width:0}
.kbadge{display:inline-flex;align-items:center;font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;margin-bottom:4px}
.kg{background:#e3f9e5;color:#1a7f37}.ky{background:#fff3cd;color:#856404}.kr{background:#fde8e8;color:#b91c1c}
.kcard-label{font-size:10px;color:#8e8e93;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kcard-val{font-size:15px;font-weight:700;letter-spacing:-.2px;white-space:nowrap}
.kcard-sub{font-size:9px;color:#8e8e93;margin-top:1px}

/* cashflow box */
.cf-box{background:white;border-radius:12px;border:1px solid #e0dcd6;overflow:hidden}
.cf-title{font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.6px;padding:10px 14px 6px}
.cfr{display:flex;justify-content:space-between;padding:7px 14px;border-bottom:1px solid #f7f5f2;font-size:12px}
.cfr:last-child{border-bottom:none}
.cft{font-weight:600;font-size:12px}
.gv{color:#1a7f37;font-weight:600}.rv{color:#b91c1c;font-weight:600}

.slabel{font-size:10px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:20px}
.block{background:white;border-radius:12px;padding:14px 16px;border:1px solid #e0dcd6}
.block-title{font-size:11px;font-weight:600;color:#ff6b35;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f0ede8}
.brow{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:12px;border-bottom:1px solid #f7f5f2}
.brow:last-child{border-bottom:none}
.brow.bb{font-weight:600}.brow.bm{color:#8e8e93}
.disc{font-size:10px;color:#8e8e93;margin-top:8px}
.fin-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.chart-wrap{background:white;border-radius:12px;border:1px solid #e0dcd6;padding:16px;margin-bottom:12px}
.chart-title{font-size:12px;font-weight:600;color:#3a3a3c;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:11px;background:white;border-radius:12px;overflow:hidden;border:1px solid #e0dcd6}
.tbl th{background:#3a3a3c;color:white;padding:8px 10px;text-align:right;font-size:10px;font-weight:600}
.tbl th:first-child{text-align:left}
.tbl td{padding:6px 10px;border-bottom:1px solid #f7f5f2;text-align:right}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr:nth-child(even){background:#faf9f7}
.tbl .paid{color:#1a7f37;font-weight:600}

/* eingaben */
.inp-page{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-items:start}
.inp-card{background:white;border-radius:14px;border:1px solid #e0dcd6;overflow:hidden}
.inp-card-header{padding:11px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background .12s}
.inp-card-header:hover{background:#faf9f7}
.inp-card-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.inp-card-title{font-size:13px;font-weight:600;flex:1}
.inp-card-meta{font-size:11px;color:#8e8e93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px;transition:opacity .2s}
.chevron{font-size:11px;color:#c0bbb4;transition:transform .25s;margin-left:4px;flex-shrink:0}
.inp-card-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s cubic-bezier(.4,0,.2,1)}
.inp-card-body-inner{overflow:hidden;border-top:0px solid #f0ede8;transition:border-top-width .01s .28s}
.inp-card.open .inp-card-body{grid-template-rows:1fr}
.inp-card.open .inp-card-body-inner{border-top-width:1px;transition:border-top-width .01s 0s}
.inp-card.open .chevron{transform:rotate(180deg)}
.inp-card.open .inp-card-meta{opacity:0;pointer-events:none}
.irow{display:flex;align-items:center;padding:6px 14px;gap:8px;border-bottom:1px solid #f7f5f2;position:relative}
.irow:last-child{border-bottom:none}
.irow:hover{background:#faf9f7}
.ilabel{flex:1;font-size:12px;color:#3a3a3c;line-height:1.3;min-width:0}
.ifield{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ifield input[type=number]{width:84px;padding:5px 8px;border:1px solid #d6d2cb;border-radius:7px;font-size:12px;text-align:right;background:#f5f2ed;color:#0055cc;font-weight:500;-moz-appearance:textfield;transition:border-color .15s,background .15s}
.ifield input[type=number]:focus{outline:none;border-color:#ff6b35;background:white}
.ifield input[type=number]::-webkit-inner-spin-button,.ifield input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.ifield input[type=text]{width:150px;padding:5px 8px;border:1px solid #d6d2cb;border-radius:7px;font-size:12px;background:#f5f2ed;color:#0055cc;font-weight:500;transition:border-color .15s}
.ifield input[type=text]:focus{outline:none;border-color:#ff6b35;background:white}
.iunit{font-size:10px;color:#8e8e93;min-width:20px}
.iinfo{width:15px;height:15px;border-radius:50%;background:#e8e5df;border:none;cursor:pointer;font-size:9px;font-weight:700;color:#8e8e93;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;line-height:1}
.iinfo:hover{background:#d6d2cb;color:#3a3a3c}
.tooltip{display:none;position:absolute;right:28px;top:50%;transform:translateY(-50%);background:#2c2c2e;color:white;font-size:11px;border-radius:8px;padding:9px 12px;width:230px;z-index:200;line-height:1.55;pointer-events:none}
.tooltip::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-left-color:#2c2c2e;border-right:none}
.iinfo:hover .tooltip{display:block}
.tt-title{font-weight:600;margin-bottom:3px}
.tt-std{color:#aaa;font-size:10px;margin-top:4px}
</style>

<div class="shell">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const S={
  adresse:'',kaufjahr:2025,kaufpreis:200000,wohnflaeche:60,anfInvest:0,
  makler:3.57,notar:1.5,grundbuch:0.5,grunderwerb:6.5,sonst:0,
  mietePqm:8,stellplatz:0,mietausfall:3,ruecklage:1,
  hausgeldU:150,hausgeldN:80,grundsteuer:50,sonstverwalt:0,
  darlehenIA:90,zinssatzI:3.5,tilgungI:2,
  darlehenII:0,zinssatzII:4,tilgungII:2,
  afa:2,gebaude:75,steuer:42,
  wertst:2,mietst:2,kostst:2,betrjahr:2050
};

const CARDS=[
  {id:'c0',title:'Objekt & Kaufpreis',icon:'🏠',color:'#ff6b35',open:true,fields:[
    {k:'adresse',l:'Adresse / Bezeichnung',t:'text',info:'Name oder Adresse des Objekts.',std:'z.B. Mülheim, 3-Zi-Wohnung'},
    {k:'kaufpreis',l:'Kaufpreis',u:'€',step:1000,info:'Vereinbarter Kaufpreis laut Kaufvertrag, ohne Nebenkosten.',std:'150.000 – 500.000 €'},
    {k:'wohnflaeche',l:'Wohnfläche',u:'m²',step:1,info:'Wohnfläche laut Grundriss oder Exposé.',std:'40 – 120 m²'},
    {k:'kaufjahr',l:'Kaufjahr',u:'',step:1,info:'Jahr des Kaufabschlusses.',std:String(new Date().getFullYear())},
    {k:'anfInvest',l:'Anfängl. Investitionen',u:'€',step:500,info:'Renovierung, Möblierung etc. zusätzlich zum Kaufpreis.',std:'0 – 30.000 €'}
  ]},
  {id:'c1',title:'Kaufnebenkosten',icon:'📋',color:'#5856d6',open:false,fields:[
    {k:'makler',l:'Maklerprovision',u:'%',step:0.01,info:'Maklerprovision des Käufers.',std:'3,57 %'},
    {k:'notar',l:'Notar',u:'%',step:0.01,info:'Notarkosten gesetzlich geregelt.',std:'1,5 %'},
    {k:'grundbuch',l:'Grundbuchamt',u:'%',step:0.01,info:'Gebühr für Eintragung im Grundbuch.',std:'0,5 %'},
    {k:'grunderwerb',l:'Grunderwerbsteuer',u:'%',step:0.1,info:'NRW & SH: 6,5% — Bayern & Sachsen: 3,5%.',std:'NRW: 6,5% · Bayern: 3,5%'},
    {k:'sonst',l:'Sonstige Nebenkosten',u:'%',step:0.01,info:'Gutachter, Finanzierungsvermittler o.ä.',std:'0 %'}
  ]},
  {id:'c2',title:'Miete & Mietausfall',icon:'🏷️',color:'#34c759',open:true,fields:[
    {k:'mietePqm',l:'Kaltmiete pro m²',u:'€',step:0.5,info:'Erzielbare Kaltmiete je m².',std:'6 – 15 €/m²'},
    {k:'stellplatz',l:'Stellplatz / Garage',u:'€/Mo.',step:5,info:'Zusätzliche Mieteinnahmen für Stellplatz.',std:'0 – 80 €/Monat'},
    {k:'mietausfall',l:'Kalk. Mietausfall',u:'%',step:0.5,info:'Sicherheitsabschlag für Leerstand & Mietausfall.',std:'3 % ≈ 2 Wochen/Jahr'},
    {k:'ruecklage',l:'Instandhaltungsrücklage',u:'€/m²/Jahr',step:0.5,info:'Eigene Rücklage für Reparaturen.',std:'8 – 12 €/m²/Jahr'}
  ]},
  {id:'c3',title:'Bewirtschaftungskosten',icon:'🔧',color:'#ff9f0a',open:false,fields:[
    {k:'hausgeldU',l:'Hausgeld (umlagefähig)',u:'€/Mo.',step:10,info:'Heizung, Wasser, Hausmeister.',std:'1,50 – 3,50 €/m²'},
    {k:'hausgeldN',l:'Hausgeld (nicht umlagef.)',u:'€/Mo.',step:10,info:'Verwaltung, WEG-Rücklage.',std:'0,50 – 1,50 €/m²'},
    {k:'grundsteuer',l:'Grundsteuer',u:'€/Mo.',step:5,info:'Monatlicher Anteil (Jahresbescheid ÷ 12).',std:'Jahresbescheid ÷ 12'},
    {k:'sonstverwalt',l:'Sonstige Verwaltung',u:'€/Mo.',step:10,info:'Hausverwaltung, Steuerberater.',std:'0 – 50 €/Monat'}
  ]},
  {id:'c4',title:'Finanzierung',icon:'🏦',color:'#007aff',open:true,fields:[
    {k:'darlehenIA',l:'Darlehen I (% vom Kaufpreis)',u:'%',step:1,info:'Beleihungsquote. 90% = 10% Eigenkapital.',std:'80 – 90 %'},
    {k:'zinssatzI',l:'Zinssatz Darlehen I',u:'%',step:0.1,info:'Aktueller Marktzins für 10 Jahre Zinsbindung.',std:'ca. 3,5 – 4,5 % p.a.'},
    {k:'tilgungI',l:'Anfängl. Tilgung I',u:'%',step:0.1,info:'2% = ca. 35 Jahre Laufzeit.',std:'2 % p.a.'},
    {k:'darlehenII',l:'Darlehen II',u:'€',step:1000,info:'Optionales zweites Darlehen (z.B. KfW).',std:'0 oder KfW-Betrag'},
    {k:'zinssatzII',l:'Zinssatz Darlehen II',u:'%',step:0.1,info:'KfW-Kredite oft günstiger.',std:'KfW: ca. 1,5 – 3 %'},
    {k:'tilgungII',l:'Anfängl. Tilgung II',u:'%',step:0.1,info:'Tilgungssatz für Darlehen II.',std:'2 % p.a.'}
  ]},
  {id:'c5',title:'Steuern & AfA',icon:'📊',color:'#5856d6',open:false,fields:[
    {k:'afa',l:'AfA-Satz',u:'%',step:0.1,info:'2% Bestandsbauten, 3% Neubauten (ab 2023).',std:'2 % Bestand · 3 % Neubau'},
    {k:'gebaude',l:'Gebäudeanteil am Kaufpreis',u:'%',step:1,info:'Anteil des Gebäudes ohne Grundstück.',std:'60 – 80 %'},
    {k:'steuer',l:'Persönl. Grenzsteuersatz',u:'%',step:1,info:'Dein Grenzsteuersatz auf zusätzliches Einkommen.',std:'42 % ab ~66.000 € zvE'}
  ]},
  {id:'c6',title:'Prognose & Wachstum',icon:'📈',color:'#34c759',open:false,fields:[
    {k:'betrjahr',l:'Betrachtungsjahr',u:'',step:1,info:'Bis zu welchem Jahr soll die Projektion berechnet werden?',std:'Kaufjahr + 25 Jahre'},
    {k:'wertst',l:'Wertsteigerung p.a.',u:'%',step:0.1,info:'Historisch Deutschland ca. 2–3% p.a.',std:'2 % p.a.'},
    {k:'mietst',l:'Mietsteigerung p.a.',u:'%',step:0.1,info:'Mietpreisbremse kann dies begrenzen.',std:'2 % p.a.'},
    {k:'kostst',l:'Kostensteigerung p.a.',u:'%',step:0.1,info:'Jährliche Steigerung der Bewirtschaftungskosten.',std:'2 % p.a.'}
  ]}
];

const openState={};
CARDS.forEach(c=>openState[c.id]=c.open);

function toggleCard(id){
  openState[id]=!openState[id];
  const card=document.getElementById('icard-'+id);
  if(!card)return;
  card.classList.toggle('open',openState[id]);
  const meta=card.querySelector('.inp-card-meta');
  if(meta)meta.textContent=openState[id]?'':summaryText(CARDS.find(c=>c.id===id));
}
function summaryText(card){
  const parts=card.fields.filter(f=>f.t!=='text').slice(0,2).map(f=>{
    const v=S[f.k];
    if(f.u==='€')return eu(v);
    if(f.u==='%')return v.toFixed(f.step<0.1?2:1)+'%';
    return String(v);
  });
  return parts.join(' · ');
}
function buildEingaben(){
  let html='<div class="inp-page">';
  CARDS.forEach(card=>{
    const isOpen=openState[card.id];
    html+=`<div class="inp-card${isOpen?' open':''}" id="icard-${card.id}">
      <div class="inp-card-header" onclick="toggleCard('${card.id}')">
        <div class="inp-card-icon" style="background:${card.color}20">${card.icon}</div>
        <div class="inp-card-title" style="color:${card.color}">${card.title}</div>
        <span class="inp-card-meta">${isOpen?'':summaryText(card)}</span>
        <span class="chevron">▾</span>
      </div>
      <div class="inp-card-body"><div class="inp-card-body-inner">`;
    card.fields.forEach(f=>{
      if(f.t==='text'){
        html+=`<div class="irow"><span class="ilabel">${f.l}</span>
          <div class="ifield"><input type="text" value="${S[f.k]}" placeholder="${f.std}"
            oninput="S['${f.k}']=this.value;document.getElementById('obj-name').textContent=this.value;if(activeTab!=='eingaben')renderTab(activeTab)"></div>
          <button class="iinfo">i<div class="tooltip"><div class="tt-title">${f.l}</div>${f.info}<div class="tt-std">Standard: ${f.std}</div></div></button>
        </div>`;
      } else {
        html+=`<div class="irow"><span class="ilabel">${f.l}</span>
          <div class="ifield">
            <input type="number" value="${S[f.k]}" step="${f.step||1}"
              oninput="S['${f.k}']=parseFloat(this.value)||0;if(activeTab!=='eingaben')renderTab(activeTab)">
            <span class="iunit">${f.u||''}</span>
          </div>
          <button class="iinfo">i<div class="tooltip"><div class="tt-title">${f.l}</div>${f.info}<div class="tt-std">Standard: ${f.std}</div></div></button>
        </div>`;
      }
    });
    html+='</div></div></div>';
  });
  return html+'</div>';
}

const p=v=>v/100;
function ann(d,z,t){if(d<=0)return{rate:0,zinsen:0,tilgung:0};const zm=z/12,r=d*(zm+t/12),zi=d*zm,ti=r-zi;return{rate:r,zinsen:zi,tilgung:ti}}
function tilgPlan(d,z,t,j=50){if(d<=0)return[];const zm=z/12,r=d*(zm+t/12);let rs=d;const pl=[];for(let i=1;i<=j;i++){let zj=0,tj=0;for(let m=0;m<12;m++){if(rs<=0)break;const zi=rs*zm,ti=Math.min(r-zi,rs);zj+=zi;tj+=ti;rs-=ti;}pl.push({j:i,zj,tj,ann:zj+tj,rs:Math.max(0,rs),kdm:(zj+tj)/12});if(rs<=0)break;}return pl}
function prjCalc(kp,nkm,bk,dG,z,t,jahre){const tp=tilgPlan(dG,z,t,50);const d=[];for(let j=0;j<=jahre;j++){const wert=kp*Math.pow(1+p(S.wertst),j),miete=nkm*Math.pow(1+p(S.mietst),j),row=tp[j]||tp[tp.length-1]||{rs:0,zj:0,tj:0},rs=row.rs,zi=row.zj/12,ti=row.tj/12,afaM=(kp*p(S.gebaude)*p(S.afa))/12,zvs=miete-bk-zi-afaM,st=zvs*p(S.steuer),cf=miete-bk-zi-ti-st;d.push({j,yr:S.kaufjahr+j,wert,rs,nv:wert-rs,miete,cf});}return d}

function calcAll(){
  const kp=S.kaufpreis,wf=S.wohnflaeche;
  const nkGes=kp*(p(S.makler)+p(S.notar)+p(S.grundbuch)+p(S.grunderwerb)+p(S.sonst));
  const nkObj={makler:kp*p(S.makler),notar:kp*p(S.notar),grundbuch:kp*p(S.grundbuch),grunderwerb:kp*p(S.grunderwerb),sonst:kp*p(S.sonst),gesamt:nkGes};
  const gI=kp+nkGes+S.anfInvest,dI=kp*p(S.darlehenIA),dII=S.darlehenII,dG=dI+dII,ek=gI-dG;
  const fI=ann(dI,p(S.zinssatzI),p(S.tilgungI)),fII=ann(dII,p(S.zinssatzII),p(S.tilgungII));
  const kd=fI.rate+fII.rate,zi=fI.zinsen+fII.zinsen,ti=fI.tilgung+fII.tilgung;
  const nkm=S.mietePqm*wf,mao=nkm*p(S.mietausfall),nkmE=nkm-mao;
  const bk=S.hausgeldN+S.sonstverwalt+(S.ruecklage*wf/12)+mao;
  const afaM=(kp*p(S.gebaude)*p(S.afa))/12,zvs=nkmE-bk-zi-afaM,stM=zvs*p(S.steuer);
  const cfOp=nkmE-bk-zi-ti,cfNSt=cfOp-stM;
  const bR=kp>0?(nkm*12)/kp:0,nR=gI>0?((nkmE-bk)*12)/gI:0,fakt=nkm>0?kp/(nkm*12):0;
  const tplan=tilgPlan(dI,p(S.zinssatzI),p(S.tilgungI),50);
  const jahre=Math.max(1,S.betrjahr-S.kaufjahr);
  const prj=prjCalc(kp,nkmE,bk,dG,(dI*p(S.zinssatzI)+dII*p(S.zinssatzII))/(dG||1),(dI*p(S.tilgungI)+dII*p(S.tilgungII))/(dG||1),jahre);
  return{nkObj,nkGes,gI,dI,dII,dG,ek,fI,fII,kd,zi,ti,nkm,mao,nkmE,bk,afaM,stM,cfOp,cfNSt,bR,nR,fakt,tplan,prj};
}

const eu=v=>new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
const pf=(v,d=2)=>(v*100).toFixed(d)+'%';
const n2=v=>new Intl.NumberFormat('de-DE',{maximumFractionDigits:1}).format(v);
function amp(v,sw){return v>=sw[0]?'kg':v>=sw[1]?'ky':'kr'}
const SW={bm:[0.06,0.05],nm:[0.05,0.04],cf:[100,0],fk:[20,25]};
function famp(v){return v<=SW.fk[0]?'kg':v<=SW.fk[1]?'ky':'kr'}
const ALBL={kg:'Gut',ky:'Ok',kr:'Kritisch'};
const ACOL={kg:'#1a7f37',ky:'#856404',kr:'#b91c1c'};

function kc(l,v,a,s){
  return`<div class="kcard"><div class="kcard-left"><span class="kbadge ${a}">${ALBL[a]}</span><div class="kcard-label">${l}</div><div class="kcard-val" style="color:${ACOL[a]}">${v}</div>${s?`<div class="kcard-sub">${s}</div>`:''}</div></div>`;
}
function br(l,v,cls=''){return`<div class="brow ${cls}"><span>${l}</span><span>${v}</span></div>`}
function cfr(l,v){return`<div class="cfr"><span>${l}</span><span class="${v>=0?'gv':'rv'}">${eu(v)}</span></div>`}
function cfrt(l,v,a){return`<div class="cfr cft" style="background:${a==='kg'?'#f0faf1':a==='ky'?'#fffbeb':'#fef2f2'}"><span>${l}</span><span style="color:${ACOL[a]}">${eu(v)}</span></div>`}
function fr(l,v,h=false){return`<div class="brow${h?' bb':''}"><span style="color:#8e8e93">${l}</span><span>${v}</span></div>`}

function buildCockpit(c){
  const bma=amp(c.bR,SW.bm),nma=amp(c.nR,SW.nm),cfa=amp(c.cfOp,SW.cf),cfna=amp(c.cfNSt,SW.cf),fa=famp(c.fakt);
  return`
<div class="cockpit-top">
  <div>
    <div class="slabel" style="margin-bottom:8px">Kennzahlen</div>
    <div class="kgrid">
      ${kc('Bruttomietrendite',pf(c.bR),bma,'Kaltmiete / KP')}
      ${kc('Nettomietrendite',pf(c.nR),nma,'nach Bewirt.')}
      ${kc('Kaufpreisfaktor',n2(c.fakt)+'x',fa,'KP / Jahreskaltmiete')}
      ${kc('Cashflow operativ',eu(c.cfOp)+'/Mo.',cfa,'vor Steuern')}
      ${kc('Cashflow n. Steuern',eu(c.cfNSt)+'/Mo.',cfna,'nach AfA & Steuern')}
      ${kc('Monatl. AfA',eu(c.afaM),'kg','steuerl. Abschreibung')}
    </div>
  </div>
  <div>
    <div class="slabel" style="margin-bottom:8px">Monatlicher Cashflow</div>
    <div class="cf-box">
      ${cfr('Nettokaltmiete',c.nkmE)}
      ${cfr('– Bewirtschaftung',-c.bk)}
      ${cfr('– Zinsen',-c.zi)}
      ${cfr('– Tilgung',-c.ti)}
      ${cfrt('= Cashflow operativ',c.cfOp,cfa)}
      ${cfr('– Steuern',-c.stM)}
      ${cfrt('= Cashflow n. Steuern',c.cfNSt,cfna)}
    </div>
  </div>
</div>
<div class="slabel">Übersicht</div>
<div class="row3">
  <div class="block"><div class="block-title">Investition</div>
    ${br('Kaufpreis',eu(S.kaufpreis))}
    ${br('Kaufnebenkosten',eu(c.nkGes),'bm')}
    ${br('Anfängl. Invest.',eu(S.anfInvest),'bm')}
    ${br('Gesamtinvestition',eu(c.gI),'bb')}
    ${br('Kaufpreis/m²',eu(S.kaufpreis/(S.wohnflaeche||1)),'bm')}
  </div>
  <div class="block"><div class="block-title">Miete & Bewirtschaftung</div>
    ${br('Kaltmiete/m²',S.mietePqm.toFixed(2)+' €')}
    ${br('Nettokaltmiete',eu(c.nkm)+'/Mo.')}
    ${br('– Mietausfall','–'+eu(c.mao)+'/Mo.','bm')}
    ${br('Nettokaltmiete eff.',eu(c.nkmE)+'/Mo.','bb')}
    ${br('Bewirtschaftung','–'+eu(c.bk)+'/Mo.','bm')}
  </div>
  <div class="block"><div class="block-title">Finanzierung</div>
    ${br('Gesamtdarlehen',eu(c.dG))}
    ${br('Eigenkapital',eu(c.ek),'bb')}
    ${br('EK-Anteil',pf(c.ek/(c.gI||1)),'bm')}
    ${br('Kapitaldienst',eu(c.kd)+'/Mo.','bb')}
    ${br('davon Zinsen',eu(c.zi)+'/Mo.','bm')}
    ${br('davon Tilgung',eu(c.ti)+'/Mo.','bm')}
  </div>
</div>
<div class="disc">Keine Gewähr für Richtigkeit. Kein Ersatz für Rechts-, Steuer- oder Finanzberatung.</div>`;
}

function buildFin(c){
  const fc=(t,col,con)=>`<div class="block" style="border-top:3px solid ${col}"><div class="block-title" style="color:${col}">${t}</div>${con}</div>`;
  return`<div class="fin-grid">
  ${fc('Darlehen I','#ff6b35',fr('Darlehenssumme',eu(c.dI))+fr('Zinssatz',pf(p(S.zinssatzI)))+fr('Anfäng. Tilgung',pf(p(S.tilgungI)))+fr('Monatl. Rate',eu(c.fI.rate),true)+fr('davon Zinsen',eu(c.fI.zinsen))+fr('davon Tilgung',eu(c.fI.tilgung)))}
  ${c.dII>0?fc('Darlehen II','#5856d6',fr('Darlehenssumme',eu(c.dII))+fr('Zinssatz',pf(p(S.zinssatzII)))+fr('Anfäng. Tilgung',pf(p(S.tilgungII)))+fr('Monatl. Rate',eu(c.fII.rate),true)+fr('davon Zinsen',eu(c.fII.zinsen))+fr('davon Tilgung',eu(c.fII.tilgung))):''}
  ${fc('Eigenkapital & Gesamt','#34c759',fr('Gesamtinvestition',eu(c.gI))+fr('Gesamtdarlehen',eu(c.dG))+fr('Eigenkapital',eu(c.ek),true)+fr('EK-Anteil',pf(c.ek/(c.gI||1)))+fr('Gesamt-Kapitaldienst',eu(c.kd),true))}
  ${fc('Nebenkosten','#8e8e93',fr('Makler',eu(c.nkObj.makler))+fr('Notar',eu(c.nkObj.notar))+fr('Grundbuchamt',eu(c.nkObj.grundbuch))+fr('Grunderwerbsteuer',eu(c.nkObj.grunderwerb))+fr('Summe',eu(c.nkGes),true)+fr('in % Kaufpreis',pf(c.nkGes/(S.kaufpreis||1))))}
</div>`;
}

let charts={};
function buildCharts(){
  return`<div class="chart-wrap"><div class="chart-title">Wertentwicklung & Restschuld</div><div style="position:relative;width:100%;height:260px"><canvas id="cW"></canvas></div></div>
<div class="chart-wrap"><div class="chart-title">Cashflow-Entwicklung (monatlich, nach Steuern)</div><div style="position:relative;width:100%;height:260px"><canvas id="cC"></canvas></div></div>`;
}
function renderCharts(c){
  ['cW','cC'].forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id]}});
  const pr=c.prj,lb=pr.map(d=>d.yr);
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:11},color:'#3a3a3c'}}},scales:{x:{ticks:{font:{size:10},maxTicksLimit:10,color:'#8e8e93'},grid:{color:'#f0ede8'}},y:{ticks:{font:{size:10},color:'#8e8e93'},grid:{color:'#f0ede8'}}}};
  const cW=document.getElementById('cW'),cC=document.getElementById('cC');
  if(!cW||!cC)return;
  const o1=JSON.parse(JSON.stringify(base));o1.scales.y.ticks.callback=v=>(v/1000).toFixed(0)+'k €';
  charts.cW=new Chart(cW,{type:'line',data:{labels:lb,datasets:[
    {label:'Immobilienwert',data:pr.map(d=>Math.round(d.wert)),borderColor:'#ff6b35',borderWidth:2,pointRadius:0,tension:.3},
    {label:'Restschuld',data:pr.map(d=>Math.round(d.rs)),borderColor:'#ff3b30',borderWidth:2,pointRadius:0,tension:.3,borderDash:[4,3]},
    {label:'Nettovermögen',data:pr.map(d=>Math.round(d.nv)),borderColor:'#34c759',borderWidth:2,pointRadius:0,tension:.3}
  ]},options:o1});
  const o2=JSON.parse(JSON.stringify(base));o2.scales.y.ticks.callback=v=>eu(v);
  charts.cC=new Chart(cC,{type:'line',data:{labels:lb,datasets:[
    {label:'Miete',data:pr.map(d=>Math.round(d.miete)),borderColor:'#5856d6',borderWidth:1.5,pointRadius:0,tension:.3},
    {label:'Cashflow n. Steuern',data:pr.map(d=>Math.round(d.cf)),borderColor:'#34c759',borderWidth:2,pointRadius:0,tension:.3}
  ]},options:o2});
}

function buildTilgung(c){
  let rows='';
  c.tplan.forEach(r=>{const paid=r.rs<=0;rows+=`<tr><td>${S.kaufjahr+r.j-1}</td><td>${eu(r.zj)}</td><td>${eu(r.tj)}</td><td>${eu(r.ann)}</td><td class="${paid?'paid':''}">${paid?'✓ abbezahlt':eu(r.rs)}</td><td>${eu(r.kdm)}</td></tr>`;});
  return`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Jahr</th><th>Zinsen p.a.</th><th>Tilgung p.a.</th><th>Annuität p.a.</th><th>Restschuld (Ende)</th><th>KD/Monat</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

let activeTab='cockpit';
function showTab(id,el){
  activeTab=id;
  ['cockpit','finanzierung','charts','tilgung','eingaben'].forEach(t=>document.getElementById('tab-'+t).style.display=t===id?'block':'none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTab(id);
}
function renderTab(id){
  const c=calcAll();
  if(id==='cockpit')document.getElementById('tab-cockpit').innerHTML=buildCockpit(c);
  else if(id==='finanzierung')document.getElementById('tab-finanzierung').innerHTML=buildFin(c);
  else if(id==='charts'){document.getElementById('tab-charts').innerHTML=buildCharts();setTimeout(()=>renderCharts(c),60)}
  else if(id==='tilgung')document.getElementById('tab-tilgung').innerHTML=buildTilgung(c);
  else if(id==='eingaben')document.getElementById('tab-eingaben').innerHTML=buildEingaben();
}
renderTab('cockpit');
</script>


<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --fs-xs:clamp(10px,1.1vw,12px);
  --fs-sm:clamp(12px,1.3vw,14px);
  --fs-md:clamp(13px,1.5vw,15px);
  --fs-lg:clamp(15px,1.8vw,18px);
  --fs-label:clamp(9px,1vw,11px);
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;font-size:var(--fs-md);background:#f0ede8;color:#2c2c2e;min-height:100vh}
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#eae7e1;border-bottom:1px solid #d6d2cb;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{display:flex;align-items:baseline;gap:10px;padding:14px 0}
.topbar-logo{font-size:var(--fs-lg);font-weight:700;color:#2c2c2e;letter-spacing:-.3px}
.topbar-obj{font-size:var(--fs-sm);color:#8e8e93}
.tab-bar{display:flex}
.tab{padding:14px clamp(10px,1.4vw,18px);font-size:var(--fs-sm);font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#8e8e93;transition:all .12s;user-select:none;white-space:nowrap}
.tab:hover{color:#3a3a3c}
.tab.active{color:#ff6b35;border-bottom-color:#ff6b35;font-weight:600}
.content{flex:1;padding:clamp(14px,2vw,24px)}

/* cockpit */
.cockpit-top{display:grid;grid-template-columns:1fr clamp(220px,22vw,300px);gap:clamp(10px,1.5vw,16px);margin-bottom:clamp(14px,2vw,20px);align-items:start}
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(6px,0.8vw,10px)}
.kcard{background:white;border-radius:10px;padding:clamp(8px,1vw,12px) clamp(10px,1.2vw,14px);border:1px solid #e0dcd6}
.kbadge{display:inline-flex;align-items:center;font-size:var(--fs-xs);font-weight:600;padding:2px 7px;border-radius:20px;margin-bottom:5px}
.kg{background:#e3f9e5;color:#1a7f37}.ky{background:#fff3cd;color:#856404}.kr{background:#fde8e8;color:#b91c1c}
.kcard-label{font-size:var(--fs-xs);color:#8e8e93;margin-bottom:2px}
.kcard-val{font-size:var(--fs-lg);font-weight:700;letter-spacing:-.2px;white-space:nowrap}
.kcard-sub{font-size:var(--fs-xs);color:#8e8e93;margin-top:2px}
.cf-box{background:white;border-radius:12px;border:1px solid #e0dcd6;overflow:hidden}
.cfr{display:flex;justify-content:space-between;padding:clamp(6px,0.8vw,9px) clamp(10px,1.2vw,14px);border-bottom:1px solid #f7f5f2;font-size:var(--fs-sm)}
.cfr:last-child{border-bottom:none}
.cft{font-weight:600;font-size:var(--fs-md)}
.gv{color:#1a7f37;font-weight:600}.rv{color:#b91c1c;font-weight:600}
.slabel{font-size:var(--fs-label);font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.row3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:clamp(8px,1vw,12px);margin-bottom:clamp(14px,2vw,20px)}
.block{background:white;border-radius:12px;padding:clamp(10px,1.2vw,14px) clamp(12px,1.4vw,16px);border:1px solid #e0dcd6}
.block-title{font-size:var(--fs-xs);font-weight:600;color:#ff6b35;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #f0ede8}
.brow{display:flex;justify-content:space-between;align-items:baseline;padding:clamp(3px,0.4vw,5px) 0;font-size:var(--fs-sm);border-bottom:1px solid #f7f5f2}
.brow:last-child{border-bottom:none}
.brow.bb{font-weight:600}.brow.bm{color:#8e8e93}
.disc{font-size:var(--fs-xs);color:#8e8e93;margin-top:8px}
.fin-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:clamp(8px,1vw,12px)}
.chart-wrap{background:white;border-radius:12px;border:1px solid #e0dcd6;padding:clamp(12px,1.5vw,18px);margin-bottom:12px}
.chart-title{font-size:var(--fs-sm);font-weight:600;color:#3a3a3c;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm);background:white;border-radius:12px;overflow:hidden;border:1px solid #e0dcd6}
.tbl th{background:#3a3a3c;color:white;padding:clamp(7px,0.9vw,10px) clamp(8px,1vw,12px);text-align:right;font-size:var(--fs-xs);font-weight:600}
.tbl th:first-child{text-align:left}
.tbl td{padding:clamp(5px,0.7vw,8px) clamp(8px,1vw,12px);border-bottom:1px solid #f7f5f2;text-align:right}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr:nth-child(even){background:#faf9f7}
.tbl .paid{color:#1a7f37;font-weight:600}

/* в”Ђв”Ђ Eingaben: zwei-spaltig nebeneinander в”Ђв”Ђ */
.inp-layout{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:0;
  background:white;
  border-radius:16px;
  border:1px solid #e0dcd6;
  overflow:hidden;
  min-height:400px;
}

/* Linke Spalte: Gruppen-Liste */
.inp-nav{
  background:#f5f2ed;
  border-right:1px solid #e0dcd6;
  padding:8px 0;
  display:flex;
  flex-direction:column;
}
.inp-nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:11px 16px;
  cursor:pointer;
  user-select:none;
  transition:background .12s;
  border-left:3px solid transparent;
  position:relative;
}
.inp-nav-item:hover{background:#ede9e2}
.inp-nav-item.active{
  background:white;
  border-left-color:#ff6b35;
}
.nav-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.nav-label{font-size:var(--fs-sm);font-weight:500;flex:1;color:#2c2c2e}
.inp-nav-item.active .nav-label{font-weight:600;color:#ff6b35}
.nav-summary{font-size:var(--fs-xs);color:#8e8e93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.inp-nav-item.active .nav-summary{display:none}
.nav-arrow{font-size:10px;color:#c0bbb4;flex-shrink:0}
.inp-nav-item.active .nav-arrow{color:#ff6b35}

/* Rechte Spalte: Felder der aktiven Gruppe */
.inp-detail{
  padding:0;
  display:flex;
  flex-direction:column;
}
.inp-detail-header{
  padding:14px 20px 12px;
  border-bottom:1px solid #f0ede8;
  display:flex;
  align-items:center;
  gap:10px;
}
.inp-detail-icon{font-size:18px}
.inp-detail-title{font-size:var(--fs-md);font-weight:600;color:#2c2c2e}
.inp-detail-fields{flex:1}

.irow{display:flex;align-items:center;padding:11px 20px;gap:12px;border-bottom:1px solid #f7f5f2;position:relative}
.irow:last-child{border-bottom:none}
.irow:hover{background:#fdfcfb}
.ilabel{flex:1;font-size:var(--fs-sm);color:#2c2c2e;line-height:1.3;min-width:0}
.ifield{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ifield input[type=number]{
  width:clamp(80px,8vw,100px);
  padding:7px 10px;
  border:1px solid #d6d2cb;
  border-radius:8px;
  font-size:var(--fs-sm);
  text-align:right;
  background:#f5f2ed;
  color:#0055cc;
  font-weight:600;
  -moz-appearance:textfield;
  transition:border-color .15s,background .15s,box-shadow .15s
}
.ifield input[type=number]:focus{outline:none;border-color:#ff6b35;background:white;box-shadow:0 0 0 3px rgba(255,107,53,.12)}
.ifield input[type=number]::-webkit-inner-spin-button,
.ifield input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.ifield input[type=text]{
  width:clamp(140px,16vw,200px);
  padding:7px 10px;
  border:1px solid #d6d2cb;
  border-radius:8px;
  font-size:var(--fs-sm);
  background:#f5f2ed;
  color:#0055cc;
  font-weight:600;
  transition:border-color .15s,background .15s,box-shadow .15s
}
.ifield input[type=text]:focus{outline:none;border-color:#ff6b35;background:white;box-shadow:0 0 0 3px rgba(255,107,53,.12)}
.iunit{font-size:var(--fs-xs);color:#8e8e93;min-width:26px;white-space:nowrap}

.iinfo{width:18px;height:18px;border-radius:50%;background:#ede9e2;border:none;cursor:pointer;font-size:10px;font-weight:700;color:#8e8e93;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.iinfo:hover{background:#d6d2cb;color:#3a3a3c}
.tooltip{display:none;position:absolute;right:26px;top:50%;transform:translateY(-50%);background:#1c1c1e;color:#f2f2f7;font-size:var(--fs-xs);border-radius:10px;padding:10px 13px;width:240px;z-index:300;line-height:1.6;pointer-events:none}
.tooltip::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-left-color:#1c1c1e;border-right:none}
.iinfo:hover .tooltip{display:block}
.tt-title{font-weight:600;margin-bottom:4px;color:#fff}
.tt-std{color:#888;font-size:var(--fs-xs);margin-top:5px;padding-top:5px;border-top:1px solid #333}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const S={
  adresse:'',kaufjahr:2025,kaufpreis:200000,wohnflaeche:60,anfInvest:0,
  makler:3.57,notar:2.0,grunderwerb:6.5,
  mietePqm:8,mietausfall:3,ruecklage:1,
  hausgeldN:80,grundsteuer:50,
  darlehenPct:90,zinssatz:3.5,tilgung:2,
  afa:2,gebaude:75,steuer:42,
  wertst:2,mietst:2,kostst:2,betrjahr:2050
};

const GROUPS=[
  {id:'g0',icon:'рџЏ ',title:'Objekt',fields:[
    {k:'adresse',l:'Adresse',t:'text',info:'Name oder Adresse des Objekts вЂ” nur zur Beschriftung.',std:'z.B. MГјlheim, 3-Zi-Wohnung'},
    {k:'kaufpreis',l:'Kaufpreis',u:'в‚¬',step:1000,info:'Vereinbarter Kaufpreis laut Kaufvertrag, ohne Nebenkosten.',std:'150.000 вЂ“ 500.000 в‚¬'},
    {k:'wohnflaeche',l:'WohnflГ¤che',u:'mВІ',step:1,info:'WohnflГ¤che laut Grundriss oder ExposГ©.',std:'40 вЂ“ 120 mВІ'},
    {k:'kaufjahr',l:'Kaufjahr',u:'',step:1,info:'Jahr des Kaufabschlusses. Startpunkt fГјr alle Zeitrechnungen.',std:String(new Date().getFullYear())},
    {k:'anfInvest',l:'Investitionen bei Kauf',u:'в‚¬',step:500,info:'Renovierung, MГ¶blierung etc. zusГ¤tzlich zum Kaufpreis.',std:'0 вЂ“ 30.000 в‚¬'}
  ]},
  {id:'g1',icon:'рџ“‹',title:'Kaufnebenkosten',fields:[
    {k:'makler',l:'Maklerprovision',u:'%',step:0.01,info:'Maklerprovision des KГ¤ufers. In DE meist 3,57% (HГ¤lfte von 7,14%).',std:'3,57 %'},
    {k:'notar',l:'Notar & Grundbuch',u:'%',step:0.01,info:'Notar ca. 1,5% + Grundbuchamt ca. 0,5% = zusammen ~2%.',std:'2,0 %'},
    {k:'grunderwerb',l:'Grunderwerbsteuer',u:'%',step:0.1,info:'Variiert je Bundesland: Bayern 3,5% вЂ” NRW & SH 6,5%.',std:'NRW: 6,5% В· Bayern: 3,5%'}
  ]},
  {id:'g2',icon:'рџЏ·пёЏ',title:'Miete',fields:[
    {k:'mietePqm',l:'Kaltmiete pro mВІ',u:'в‚¬',step:0.5,info:'Erzielbare Kaltmiete je mВІ. Am lokalen Mietspiegel orientieren.',std:'6 вЂ“ 15 в‚¬/mВІ je nach Lage'},
    {k:'mietausfall',l:'Kalk. Mietausfall',u:'%',step:0.5,info:'Abschlag fГјr Leerstand & MietausfГ¤lle вЂ” konservativ einplanen.',std:'3 % в‰€ 2 Wochen/Jahr'},
    {k:'ruecklage',l:'InstandhaltungsrГјcklage',u:'в‚¬/mВІ/Jahr',step:0.5,info:'Eigene RГјcklage fГјr Reparaturen, zusГ¤tzlich zur WEG-RГјcklage.',std:'8 вЂ“ 12 в‚¬/mВІ/Jahr empfohlen'}
  ]},
  {id:'g3',icon:'рџ”§',title:'Bewirtschaftung',fields:[
    {k:'hausgeldN',l:'Hausgeld (EigentГјmeranteil)',u:'в‚¬/Mo.',step:10,info:'Nicht umlagefГ¤higer Teil: Verwaltung, WEG-RГјcklage. TrГ¤gt der EigentГјmer.',std:'0,50 вЂ“ 1,50 в‚¬/mВІ mtl.'},
    {k:'grundsteuer',l:'Grundsteuer',u:'в‚¬/Mo.',step:5,info:'Monatlicher Anteil der Grundsteuer (Jahresbescheid Г· 12).',std:'Jahresbescheid Г· 12'}
  ]},
  {id:'g4',icon:'рџЏ¦',title:'Finanzierung',fields:[
    {k:'darlehenPct',l:'Darlehen (% des Kaufpreises)',u:'%',step:1,info:'Beleihungsquote. 90% bedeutet 10% Eigenkapital. Empfehlung: mind. 20% EK.',std:'80 вЂ“ 90 %'},
    {k:'zinssatz',l:'Zinssatz',u:'%',step:0.1,info:'Aktueller Marktzins fГјr 10 Jahre Zinsbindung вЂ” tagesaktuell bei der Bank erfragen.',std:'Aktuell ca. 3,5 вЂ“ 4,5 % p.a.'},
    {k:'tilgung',l:'AnfГ¤ngliche Tilgung',u:'%',step:0.1,info:'AnfГ¤nglicher Tilgungssatz. 2% p.a. entspricht ca. 35 Jahren Laufzeit.',std:'2 % p.a. (= ~35 Jahre)'}
  ]},
  {id:'g5',icon:'рџ“Љ',title:'Steuern & AfA',fields:[
    {k:'afa',l:'AfA-Satz',u:'%',step:0.1,info:'JГ¤hrliche steuerliche Abschreibung. 2% fГјr Bestandsbauten, 3% fГјr Neubauten ab 2023.',std:'2 % Bestand В· 3 % Neubau'},
    {k:'gebaude',l:'GebГ¤udeanteil am Kaufpreis',u:'%',step:1,info:'Anteil des GebГ¤udes ohne GrundstГјck. Nur der GebГ¤udewert ist abschreibbar.',std:'60 вЂ“ 80 % (je nach Lage)'},
    {k:'steuer',l:'PersГ¶nl. Grenzsteuersatz',u:'%',step:1,info:'Dein Steuersatz auf zusГ¤tzliches Einkommen. Aus dem aktuellen Steuerbescheid.',std:'42 % ab ca. 66.000 в‚¬ zvE'}
  ]},
  {id:'g6',icon:'рџ“€',title:'Prognose',fields:[
    {k:'betrjahr',l:'Betrachtungsjahr',u:'',step:1,info:'Bis zu welchem Jahr soll die Langfristprojektion gehen?',std:'Kaufjahr + 25 Jahre'},
    {k:'wertst',l:'Wertsteigerung p.a.',u:'%',step:0.1,info:'JГ¤hrliche Wertsteigerung. Historisch Deutschland: ~2 % p.a.',std:'2 % p.a.'},
    {k:'mietst',l:'Mietsteigerung p.a.',u:'%',step:0.1,info:'JГ¤hrliche Mietsteigerung.',std:'2 % p.a.'},
    {k:'kostst',l:'Kostensteigerung p.a.',u:'%',step:0.1,info:'JГ¤hrliche Kostensteigerung (Inflation).',std:'2 % p.a.'}
  ]}
];

let activeGroup='g0';

function groupSummary(g){
  return g.fields.filter(f=>f.t!=='text').slice(0,1).map(f=>{
    const v=S[f.k];
    return f.u==='в‚¬'?eu(v):f.u==='%'?v.toFixed(f.step<0.1?2:1)+'%':String(v);
  }).join('');
}

function selectGroup(id){
  activeGroup=id;
  document.querySelectorAll('.inp-nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.gid===id);
  });
  const g=GROUPS.find(g=>g.id===id);
  const detail=document.getElementById('inp-detail');
  if(!detail||!g)return;
  detail.innerHTML=renderDetail(g);
}

function renderDetail(g){
  let html=`<div class="inp-detail-header">
    <span class="inp-detail-icon">${g.icon}</span>
    <span class="inp-detail-title">${g.title}</span>
  </div><div class="inp-detail-fields">`;
  g.fields.forEach(f=>{
    if(f.t==='text'){
      html+=`<div class="irow"><span class="ilabel">${f.l}</span>
        <div class="ifield"><input type="text" value="${S[f.k]}" placeholder="${f.std}"
          oninput="S['${f.k}']=this.value;document.getElementById('obj-name').textContent=this.value;if(activeTab!=='eingaben')renderTab(activeTab)"></div>
        <button class="iinfo">i<div class="tooltip"><div class="tt-title">${f.l}</div>${f.info}<div class="tt-std">Standard: ${f.std}</div></div></button>
      </div>`;
    } else {
      html+=`<div class="irow"><span class="ilabel">${f.l}</span>
        <div class="ifield">
          <input type="number" value="${S[f.k]}" step="${f.step||1}"
            oninput="S['${f.k}']=parseFloat(this.value)||0;if(activeTab!=='eingaben')renderTab(activeTab)">
          <span class="iunit">${f.u||''}</span>
        </div>
        <button class="iinfo">i<div class="tooltip"><div class="tt-title">${f.l}</div>${f.info}<div class="tt-std">Standard: ${f.std}</div></div></button>
      </div>`;
    }
  });
  return html+'</div>';
}

function buildEingaben(){
  const g=GROUPS.find(g=>g.id===activeGroup)||GROUPS[0];
  let navHtml='<div class="inp-nav">';
  GROUPS.forEach(gr=>{
    const sum=groupSummary(gr);
    navHtml+=`<div class="inp-nav-item${gr.id===activeGroup?' active':''}" data-gid="${gr.id}" onclick="selectGroup('${gr.id}')">
      <span class="nav-icon">${gr.icon}</span>
      <span class="nav-label">${gr.title}</span>
      ${sum?`<span class="nav-summary">${sum}</span>`:''}
      <span class="nav-arrow">вЂє</span>
    </div>`;
  });
  navHtml+='</div>';
  return`<div class="inp-layout">${navHtml}<div class="inp-detail" id="inp-detail">${renderDetail(g)}</div></div>`;
}

const p=v=>v/100;
function ann(d,z,t){if(d<=0)return{rate:0,zinsen:0,tilgung:0};const zm=z/12,r=d*(zm+t/12),zi=d*zm,ti=r-zi;return{rate:r,zinsen:zi,tilgung:ti}}
function tilgPlan(d,z,t,j=50){if(d<=0)return[];const zm=z/12,r=d*(zm+t/12);let rs=d;const pl=[];for(let i=1;i<=j;i++){let zj=0,tj=0;for(let m=0;m<12;m++){if(rs<=0)break;const zi=rs*zm,ti=Math.min(r-zi,rs);zj+=zi;tj+=ti;rs-=ti;}pl.push({j:i,zj,tj,ann:zj+tj,rs:Math.max(0,rs),kdm:(zj+tj)/12});if(rs<=0)break;}return pl}
function prjCalc(kp,nkm,bk,dG,z,t,jahre){const tp=tilgPlan(dG,z,t,50);const d=[];for(let j=0;j<=jahre;j++){const wert=kp*Math.pow(1+p(S.wertst),j),miete=nkm*Math.pow(1+p(S.mietst),j),row=tp[j]||tp[tp.length-1]||{rs:0,zj:0,tj:0},rs=row.rs,zi=row.zj/12,ti=row.tj/12,afaM=(kp*p(S.gebaude)*p(S.afa))/12,zvs=miete-bk-zi-afaM,st=zvs*p(S.steuer),cf=miete-bk-zi-ti-st;d.push({j,yr:S.kaufjahr+j,wert,rs,nv:wert-rs,miete,cf});}return d}

function calcAll(){
  const kp=S.kaufpreis,wf=S.wohnflaeche;
  const nkGes=kp*(p(S.makler)+p(S.notar)+p(S.grunderwerb));
  const nkObj={makler:kp*p(S.makler),notar:kp*p(S.notar),grunderwerb:kp*p(S.grunderwerb),gesamt:nkGes};
  const gI=kp+nkGes+S.anfInvest,darlehen=kp*p(S.darlehenPct),ek=gI-darlehen;
  const fin=ann(darlehen,p(S.zinssatz),p(S.tilgung));
  const nkm=S.mietePqm*wf,mao=nkm*p(S.mietausfall),nkmE=nkm-mao;
  const bk=S.hausgeldN+S.grundsteuer+(S.ruecklage*wf/12)+mao;
  const afaM=(kp*p(S.gebaude)*p(S.afa))/12,zvs=nkmE-bk-fin.zinsen-afaM,stM=zvs*p(S.steuer);
  const cfOp=nkmE-bk-fin.zinsen-fin.tilgung,cfNSt=cfOp-stM;
  const bR=kp>0?(nkm*12)/kp:0,nR=gI>0?((nkmE-bk)*12)/gI:0,fakt=nkm>0?kp/(nkm*12):0;
  const tplan=tilgPlan(darlehen,p(S.zinssatz),p(S.tilgung),50);
  const jahre=Math.max(1,S.betrjahr-S.kaufjahr);
  const prj=prjCalc(kp,nkmE,bk,darlehen,p(S.zinssatz),p(S.tilgung),jahre);
  return{nkObj,nkGes,gI,darlehen,ek,fin,nkm,mao,nkmE,bk,afaM,stM,cfOp,cfNSt,bR,nR,fakt,tplan,prj};
}

const eu=v=>new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
const pf=(v,d=2)=>(v*100).toFixed(d)+'%';
const n2=v=>new Intl.NumberFormat('de-DE',{maximumFractionDigits:1}).format(v);
function amp(v,sw){return v>=sw[0]?'kg':v>=sw[1]?'ky':'kr'}
const SW={bm:[0.06,0.05],nm:[0.05,0.04],cf:[100,0],fk:[20,25]};
function famp(v){return v<=SW.fk[0]?'kg':v<=SW.fk[1]?'ky':'kr'}
const ALBL={kg:'Gut',ky:'Ok',kr:'Kritisch'};
const ACOL={kg:'#1a7f37',ky:'#856404',kr:'#b91c1c'};

function kc(l,v,a,s){return`<div class="kcard"><span class="kbadge ${a}">${ALBL[a]}</span><div class="kcard-label">${l}</div><div class="kcard-val" style="color:${ACOL[a]}">${v}</div>${s?`<div class="kcard-sub">${s}</div>`:''}</div>`}
function br(l,v,cls=''){return`<div class="brow ${cls}"><span>${l}</span><span>${v}</span></div>`}
function cfr(l,v){return`<div class="cfr"><span>${l}</span><span class="${v>=0?'gv':'rv'}">${eu(v)}</span></div>`}
function cfrt(l,v,a){return`<div class="cfr cft" style="background:${a==='kg'?'#f0faf1':a==='ky'?'#fffbeb':'#fef2f2'}"><span>${l}</span><span style="color:${ACOL[a]}">${eu(v)}</span></div>`}
function fr(l,v,h=false){return`<div class="brow${h?' bb':''}"><span style="color:#8e8e93">${l}</span><span>${v}</span></div>`}

function buildCockpit(c){
  const bma=amp(c.bR,SW.bm),nma=amp(c.nR,SW.nm),cfa=amp(c.cfOp,SW.cf),cfna=amp(c.cfNSt,SW.cf),fa=famp(c.fakt);
  return`<div class="cockpit-top">
  <div>
    <div class="slabel" style="margin-bottom:8px">Kennzahlen</div>
    <div class="kgrid">
      ${kc('Bruttomietrendite',pf(c.bR),bma,'Kaltmiete / KP')}
      ${kc('Nettomietrendite',pf(c.nR),nma,'nach Bewirt.')}
      ${kc('Kaufpreisfaktor',n2(c.fakt)+'x',fa,'KP / Jahreskaltmiete')}
      ${kc('Cashflow operativ',eu(c.cfOp)+'/Mo.',cfa,'vor Steuern')}
      ${kc('Cashflow n. Steuern',eu(c.cfNSt)+'/Mo.',cfna,'nach AfA & Steuern')}
      ${kc('Monatl. AfA',eu(c.afaM),'kg','steuerl. Abschreibung')}
    </div>
  </div>
  <div>
    <div class="slabel" style="margin-bottom:8px">Monatlicher Cashflow</div>
    <div class="cf-box">
      ${cfr('Nettokaltmiete',c.nkmE)}
      ${cfr('вЂ“ Bewirtschaftung',-c.bk)}
      ${cfr('вЂ“ Zinsen',-c.fin.zinsen)}
      ${cfr('вЂ“ Tilgung',-c.fin.tilgung)}
      ${cfrt('= Cashflow operativ',c.cfOp,cfa)}
      ${cfr('вЂ“ Steuern',-c.stM)}
      ${cfrt('= Cashflow n. Steuern',c.cfNSt,cfna)}
    </div>
  </div>
</div>
<div class="slabel">Гњbersicht</div>
<div class="row3">
  <div class="block"><div class="block-title">Investition</div>
    ${br('Kaufpreis',eu(S.kaufpreis))}${br('Kaufnebenkosten',eu(c.nkGes),'bm')}${br('AnfГ¤ngl. Invest.',eu(S.anfInvest),'bm')}${br('Gesamtinvestition',eu(c.gI),'bb')}${br('Kaufpreis/mВІ',eu(S.kaufpreis/(S.wohnflaeche||1)),'bm')}
  </div>
  <div class="block"><div class="block-title">Miete & Bewirtschaftung</div>
    ${br('Kaltmiete/mВІ',S.mietePqm.toFixed(2)+' в‚¬')}${br('Nettokaltmiete',eu(c.nkm)+'/Mo.')}${br('вЂ“ Mietausfall','вЂ“'+eu(c.mao)+'/Mo.','bm')}${br('Nettokaltmiete eff.',eu(c.nkmE)+'/Mo.','bb')}${br('Bewirtschaftung','вЂ“'+eu(c.bk)+'/Mo.','bm')}
  </div>
  <div class="block"><div class="block-title">Finanzierung</div>
    ${br('Darlehen',eu(c.darlehen))}${br('Eigenkapital',eu(c.ek),'bb')}${br('EK-Anteil',pf(c.ek/(c.gI||1)),'bm')}${br('Kapitaldienst',eu(c.fin.rate)+'/Mo.','bb')}${br('davon Zinsen',eu(c.fin.zinsen)+'/Mo.','bm')}${br('davon Tilgung',eu(c.fin.tilgung)+'/Mo.','bm')}
  </div>
</div>
<div class="disc">Keine GewГ¤hr fГјr Richtigkeit. Kein Ersatz fГјr Rechts-, Steuer- oder Finanzberatung.</div>`;
}

function buildFin(c){
  const fc=(t,col,con)=>`<div class="block" style="border-top:3px solid ${col}"><div class="block-title" style="color:${col}">${t}</div>${con}</div>`;
  return`<div class="fin-grid">
  ${fc('Darlehen','#ff6b35',fr('Darlehenssumme',eu(c.darlehen))+fr('Zinssatz',pf(p(S.zinssatz)))+fr('AnfГ¤ng. Tilgung',pf(p(S.tilgung)))+fr('Monatl. Rate',eu(c.fin.rate),true)+fr('davon Zinsen',eu(c.fin.zinsen))+fr('davon Tilgung',eu(c.fin.tilgung)))}
  ${fc('Eigenkapital & Gesamtinvestition','#34c759',fr('Kaufpreis',eu(S.kaufpreis))+fr('Nebenkosten',eu(c.nkGes))+fr('AnfГ¤ngl. Invest.',eu(S.anfInvest))+fr('Gesamtinvestition',eu(c.gI),true)+fr('Eigenkapital',eu(c.ek),true)+fr('EK-Anteil',pf(c.ek/(c.gI||1))))}
  ${fc('Nebenkosten','#8e8e93',fr('Makler',eu(c.nkObj.makler))+fr('Notar & Grundbuch',eu(c.nkObj.notar))+fr('Grunderwerbsteuer',eu(c.nkObj.grunderwerb))+fr('Summe',eu(c.nkGes),true)+fr('in % des Kaufpreises',pf(c.nkGes/(S.kaufpreis||1))))}
  ${fc('Steuern & AfA','#5856d6',fr('AfA-Satz',pf(p(S.afa)))+fr('GebГ¤udeanteil',pf(p(S.gebaude)))+fr('Monatl. AfA',eu(c.afaM))+fr('Grenzsteuersatz',pf(p(S.steuer)))+fr('Monatl. Steuern',eu(c.stM),true))}
</div>`;
}

let charts={};
function buildCharts(){
  return`<div class="chart-wrap"><div class="chart-title">Wertentwicklung & Restschuld</div><div style="position:relative;width:100%;height:280px"><canvas id="cW"></canvas></div></div>
<div class="chart-wrap"><div class="chart-title">Cashflow-Entwicklung (monatlich, nach Steuern)</div><div style="position:relative;width:100%;height:280px"><canvas id="cC"></canvas></div></div>`;
}
function renderCharts(c){
  ['cW','cC'].forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id]}});
  const pr=c.prj,lb=pr.map(d=>d.yr);
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:12},color:'#3a3a3c'}}},scales:{x:{ticks:{font:{size:11},maxTicksLimit:10,color:'#8e8e93'},grid:{color:'#f0ede8'}},y:{ticks:{font:{size:11},color:'#8e8e93'},grid:{color:'#f0ede8'}}}};
  const cW=document.getElementById('cW'),cC=document.getElementById('cC');
  if(!cW||!cC)return;
  const o1=JSON.parse(JSON.stringify(base));o1.scales.y.ticks.callback=v=>(v/1000).toFixed(0)+'k в‚¬';
  charts.cW=new Chart(cW,{type:'line',data:{labels:lb,datasets:[
    {label:'Immobilienwert',data:pr.map(d=>Math.round(d.wert)),borderColor:'#ff6b35',borderWidth:2,pointRadius:0,tension:.3},
    {label:'Restschuld',data:pr.map(d=>Math.round(d.rs)),borderColor:'#ff3b30',borderWidth:2,pointRadius:0,tension:.3,borderDash:[4,3]},
    {label:'NettovermГ¶gen',data:pr.map(d=>Math.round(d.nv)),borderColor:'#34c759',borderWidth:2,pointRadius:0,tension:.3}
  ]},options:o1});
  const o2=JSON.parse(JSON.stringify(base));o2.scales.y.ticks.callback=v=>eu(v);
  charts.cC=new Chart(cC,{type:'line',data:{labels:lb,datasets:[
    {label:'Miete',data:pr.map(d=>Math.round(d.miete)),borderColor:'#5856d6',borderWidth:1.5,pointRadius:0,tension:.3},
    {label:'Cashflow n. Steuern',data:pr.map(d=>Math.round(d.cf)),borderColor:'#34c759',borderWidth:2,pointRadius:0,tension:.3}
  ]},options:o2});
}

function buildTilgung(c){
  let rows='';
  c.tplan.forEach(r=>{const paid=r.rs<=0;rows+=`<tr><td>${S.kaufjahr+r.j-1}</td><td>${eu(r.zj)}</td><td>${eu(r.tj)}</td><td>${eu(r.ann)}</td><td class="${paid?'paid':''}">${paid?'вњ“ abbezahlt':eu(r.rs)}</td><td>${eu(r.kdm)}</td></tr>`;});
  return`<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>Jahr</th><th>Zinsen p.a.</th><th>Tilgung p.a.</th><th>AnnuitГ¤t p.a.</th><th>Restschuld (Ende)</th><th>KD/Monat</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

let activeTab='cockpit';
function showTab(id,el){
  activeTab=id;
  ['cockpit','finanzierung','charts','tilgung','eingaben'].forEach(t=>document.getElementById('tab-'+t).style.display=t===id?'block':'none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTab(id);
}
function renderTab(id){
  const c=calcAll();
  if(id==='cockpit')document.getElementById('tab-cockpit').innerHTML=buildCockpit(c);
  else if(id==='finanzierung')document.getElementById('tab-finanzierung').innerHTML=buildFin(c);
  else if(id==='charts'){document.getElementById('tab-charts').innerHTML=buildCharts();setTimeout(()=>renderCharts(c),60)}
  else if(id==='tilgung')document.getElementById('tab-tilgung').innerHTML=buildTilgung(c);
  else if(id==='eingaben')document.getElementById('tab-eingaben').innerHTML=buildEingaben();
}
renderTab('cockpit');
</script>

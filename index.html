
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --fs-xs:clamp(10px,1.1vw,12px);
  --fs-sm:clamp(12px,1.3vw,14px);
  --fs-md:clamp(13px,1.5vw,15px);
  --fs-lg:clamp(15px,1.8vw,18px);
  --fs-xl:clamp(18px,2.2vw,24px);
  --fs-label:clamp(9px,1vw,11px);
  --gap:clamp(10px,1.2vw,16px);
  --pad:clamp(12px,1.4vw,18px);
  --radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;font-size:var(--fs-md);background:#f0ede8;color:#2c2c2e;min-height:100vh}
.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#eae7e1;border-bottom:1px solid #d6d2cb;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.topbar-left{display:flex;align-items:baseline;gap:10px;padding:14px 0;flex-shrink:0}
.topbar-logo{font-size:var(--fs-lg);font-weight:700;color:#2c2c2e;letter-spacing:-.3px}
.topbar-obj{font-size:var(--fs-sm);color:#8e8e93}
.tab-bar{display:flex}
.tab{padding:14px clamp(10px,1.4vw,18px);font-size:var(--fs-sm);font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#8e8e93;transition:all .12s;user-select:none;white-space:nowrap}
.tab:hover{color:#3a3a3c}
.tab.active{color:#ff6b35;border-bottom-color:#ff6b35;font-weight:600}
.content{flex:1;padding:clamp(16px,2vw,24px)}
.sec-header{display:flex;align-items:center;gap:8px;margin-bottom:var(--gap)}
.sec-header-icon{font-size:15px;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-title{font-size:var(--fs-md);font-weight:600;color:#2c2c2e}
.sec-divider{height:1px;background:#e0dcd6;margin:clamp(14px,1.8vw,20px) 0}
.card{background:white;border-radius:var(--radius);border:1px solid #e0dcd6;overflow:hidden}
.card-header{padding:11px var(--pad);border-bottom:1px solid #f0ede8;display:flex;align-items:center;gap:8px}
.card-header-icon{font-size:14px}
.card-title{font-size:var(--fs-sm);font-weight:600;color:#2c2c2e}
.card-body{padding:var(--pad)}
.drow{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:var(--fs-sm);border-bottom:1px solid #f7f5f2}
.drow:last-child{border-bottom:none}
.drow .dl{color:#8e8e93}
.drow .dv{font-weight:500;color:#2c2c2e}
.drow.drow-bold .dl{color:#2c2c2e;font-weight:600}
.drow.drow-bold .dv{font-weight:700}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--gap)}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--gap)}
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap)}
.kcard{background:white;border-radius:var(--radius);padding:clamp(10px,1.2vw,14px);border:1px solid #e0dcd6;position:relative}
.kcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px}
.kbadge{display:inline-flex;align-items:center;font-size:var(--fs-xs);font-weight:600;padding:2px 8px;border-radius:20px}
.kg{background:#e3f9e5;color:#1a7f37}.ky{background:#fff3cd;color:#856404}.kr{background:#fde8e8;color:#b91c1c}
.kcard-label{font-size:var(--fs-xs);color:#8e8e93;margin-bottom:3px}
.kcard-val{font-size:var(--fs-lg);font-weight:700;letter-spacing:-.2px;white-space:nowrap}
.kcard-sub{font-size:var(--fs-xs);color:#8e8e93;margin-top:2px}
.kinfo-btn{width:16px;height:16px;border-radius:50%;background:#ede9e2;border:none;cursor:pointer;font-size:9px;font-weight:700;color:#8e8e93;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.kinfo-btn:hover{background:#d6d2cb;color:#3a3a3c}
.ktooltip{display:none;position:absolute;top:calc(100% + 8px);right:0;background:#1c1c1e;color:#f2f2f7;font-size:var(--fs-xs);border-radius:10px;padding:12px 14px;width:260px;z-index:400;line-height:1.6;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.ktooltip::before{content:'';position:absolute;top:-5px;right:5px;border:5px solid transparent;border-bottom-color:#1c1c1e;border-top:none}
.kinfo-btn:hover .ktooltip{display:block}
.kt-title{font-weight:600;font-size:var(--fs-sm);margin-bottom:6px;color:#fff}
.kt-desc{color:#c8c8cc;margin-bottom:8px}
.kt-scale{display:flex;flex-direction:column;gap:3px}
.kt-row{display:flex;align-items:center;gap:6px;font-size:10px}
.kt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kt-dot.g{background:#34c759}.kt-dot.y{background:#f4d03f}.kt-dot.r{background:#ff453a}
.kt-rowlbl{color:#aaa}
.cf-box{background:white;border-radius:var(--radius);border:1px solid #e0dcd6;overflow:hidden}
.cfr{display:flex;justify-content:space-between;padding:8px var(--pad);border-bottom:1px solid #f7f5f2;font-size:var(--fs-sm)}
.cfr:last-child{border-bottom:none}
.cft{font-weight:600}
.gv{color:#1a7f37;font-weight:600}.rv{color:#b91c1c;font-weight:600}
.fazit{border-radius:var(--radius);border:1.5px solid;padding:var(--pad) clamp(14px,1.6vw,20px);margin-bottom:var(--gap);display:flex;gap:14px;align-items:flex-start}
.fazit-icon{font-size:26px;flex-shrink:0;line-height:1;margin-top:2px}
.fazit-body{flex:1;min-width:0}
.fazit-verdict{font-size:var(--fs-lg);font-weight:700;margin-bottom:4px;letter-spacing:-.2px}
.fazit-summary{font-size:var(--fs-sm);line-height:1.55;margin-bottom:10px;opacity:.9}
.fazit-points{display:flex;flex-direction:column;gap:4px}
.fazit-point{display:flex;align-items:flex-start;gap:7px;font-size:var(--fs-xs);line-height:1.45}
.fp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.fazit.green{background:#f0faf1;border-color:#86efac}
.fazit.green .fazit-verdict,.fazit.green .fazit-summary,.fazit.green .fazit-point{color:#166534}
.fazit.yellow{background:#fefce8;border-color:#fde047}
.fazit.yellow .fazit-verdict,.fazit.yellow .fazit-summary,.fazit.yellow .fazit-point{color:#713f12}
.fazit.red{background:#fff1f2;border-color:#fca5a5}
.fazit.red .fazit-verdict,.fazit.red .fazit-summary,.fazit.red .fazit-point{color:#881337}
.accordion{background:white;border-radius:var(--radius);border:1px solid #e0dcd6;overflow:hidden}
.accordion-header{display:flex;align-items:center;gap:12px;padding:13px var(--pad);cursor:pointer;user-select:none;transition:background .12s}
.accordion-header:hover{background:#faf9f7}
.accordion.open .accordion-header{border-bottom:1px solid #f0ede8}
.accordion-icon{width:30px;height:30px;border-radius:7px;background:#f0ede8;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.accordion-title{font-size:var(--fs-md);font-weight:600;color:#2c2c2e;flex:1}
.accordion-meta{display:flex;gap:clamp(10px,2vw,24px);font-size:var(--fs-xs);color:#8e8e93;flex-wrap:wrap}
.accordion-meta strong{color:#2c2c2e}
.accordion-chevron{font-size:11px;color:#c0bbb4;transition:transform .25s;flex-shrink:0}
.accordion.open .accordion-chevron{transform:rotate(180deg)}
.accordion-body{display:grid;grid-template-rows:0fr;transition:grid-template-rows .28s cubic-bezier(.4,0,.2,1)}
.accordion.open .accordion-body{grid-template-rows:1fr}
.accordion-inner{overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.tbl th{background:#3a3a3c;color:white;padding:9px clamp(10px,1.2vw,16px);text-align:right;font-size:var(--fs-xs);font-weight:600}
.tbl th:first-child{text-align:left}
.tbl td{padding:7px clamp(10px,1.2vw,16px);border-bottom:1px solid #f7f5f2;text-align:right}
.tbl td:first-child{text-align:left;font-weight:500}
.tbl tr:nth-child(even){background:#faf9f7}
.tbl tr:hover{background:#fff8f5}
.tbl .done-row td{color:#1a7f37;font-weight:600}
.disclaimer{font-size:var(--fs-xs);color:#8e8e93;margin-top:clamp(10px,1.2vw,16px);padding-top:10px;border-top:1px solid #e0dcd6}

/* ── Input tab ── */
.inp-layout{display:grid;grid-template-columns:240px 1fr;gap:0;background:white;border-radius:16px;border:1px solid #e0dcd6;overflow:hidden;min-height:420px}
.inp-nav{background:#f5f2ed;border-right:1px solid #e0dcd6;padding:8px 0}
.inp-nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;transition:background .12s;border-left:3px solid transparent}
.inp-nav-item:hover{background:#ede9e2}
.inp-nav-item.active{background:white;border-left-color:#ff6b35}
.nav-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.nav-label{font-size:var(--fs-sm);font-weight:500;flex:1;color:#2c2c2e}
.inp-nav-item.active .nav-label{font-weight:600;color:#ff6b35}
.nav-summary{font-size:var(--fs-xs);color:#8e8e93;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72px}
.inp-nav-item.active .nav-summary{display:none}
.nav-arr{font-size:10px;color:#c0bbb4;flex-shrink:0}
.inp-nav-item.active .nav-arr{color:#ff6b35}
.inp-detail{display:flex;flex-direction:column}
.inp-dheader{padding:13px 20px 11px;border-bottom:1px solid #f0ede8;display:flex;align-items:center;gap:9px}
.inp-dicon{font-size:17px}
.inp-dtitle{font-size:var(--fs-md);font-weight:600;color:#2c2c2e}
.irow{display:flex;align-items:center;padding:10px 20px;gap:10px;border-bottom:1px solid #f7f5f2;position:relative}
.irow:last-child{border-bottom:none}
.irow:hover{background:#fdfcfb}
.ilabel{flex:1;min-width:0}
.ilabel-main{font-size:var(--fs-sm);color:#2c2c2e;display:block}
.ilabel-hint{font-size:var(--fs-xs);color:#8e8e93;display:block;margin-top:1px}
.ifield{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ifield input[type=number]{width:clamp(78px,7.5vw,96px);padding:6px 9px;border:1px solid #d6d2cb;border-radius:7px;font-size:var(--fs-sm);text-align:right;background:#f5f2ed;color:#0055cc;font-weight:600;-moz-appearance:textfield;transition:border-color .15s,background .15s,box-shadow .15s}
.ifield input[type=number].auto-val{background:#fff8f5;border-color:#ffd4c2;color:#cc4400}
.ifield input[type=number]:focus{outline:none;border-color:#ff6b35;background:white;box-shadow:0 0 0 3px rgba(255,107,53,.1);color:#0055cc}
.ifield input[type=number]::-webkit-inner-spin-button,.ifield input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.ifield input[type=text]{width:clamp(130px,14vw,185px);padding:6px 9px;border:1px solid #d6d2cb;border-radius:7px;font-size:var(--fs-sm);background:#f5f2ed;color:#0055cc;font-weight:600;transition:border-color .15s}
.ifield input[type=text]:focus{outline:none;border-color:#ff6b35;background:white;box-shadow:0 0 0 3px rgba(255,107,53,.1)}
.iunit{font-size:var(--fs-xs);color:#8e8e93;min-width:24px;white-space:nowrap}
.reset-btn{background:none;border:none;cursor:pointer;font-size:var(--fs-xs);color:#8e8e93;padding:2px 6px;border-radius:5px;flex-shrink:0;white-space:nowrap}
.reset-btn:hover{background:#f0ede8;color:#ff6b35}
.auto-badge{font-size:9px;background:#fff0eb;color:#cc4400;padding:1px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.iinfo{width:17px;height:17px;border-radius:50%;background:#ede9e2;border:none;cursor:pointer;font-size:9px;font-weight:700;color:#8e8e93;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.iinfo:hover{background:#d6d2cb;color:#3a3a3c}
.tooltip{display:none;position:absolute;right:25px;top:50%;transform:translateY(-50%);background:#1c1c1e;color:#f2f2f7;font-size:var(--fs-xs);border-radius:10px;padding:10px 13px;width:245px;z-index:300;line-height:1.6;pointer-events:none}
.tooltip::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);border:5px solid transparent;border-left-color:#1c1c1e;border-right:none}
.iinfo:hover .tooltip{display:block}
.tt-title{font-weight:600;margin-bottom:4px;color:#fff}
.tt-std{color:#aaa;font-size:var(--fs-xs);margin-top:5px;padding-top:5px;border-top:1px solid #333}

/* ── Cashflow Tab ── */
.cf-year-control{background:white;border-radius:var(--radius);border:1px solid #e0dcd6;padding:var(--pad);display:flex;align-items:center;gap:16px;margin-bottom:var(--gap);flex-wrap:wrap}
.cf-year-label{font-size:var(--fs-sm);color:#8e8e93;white-space:nowrap}
.cf-year-nav{display:flex;align-items:center;gap:8px}
.cf-year-btn{width:32px;height:32px;border-radius:8px;background:#f5f2ed;border:1px solid #d6d2cb;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#3a3a3c;transition:background .1s;flex-shrink:0;user-select:none}
.cf-year-btn:hover{background:#ede9e2}
.cf-year-display{font-size:var(--fs-xl);font-weight:700;color:#2c2c2e;min-width:90px;text-align:center;letter-spacing:-.5px}
.cf-year-sub{font-size:var(--fs-xs);color:#8e8e93;text-align:center;margin-top:1px}
.cf-year-input{display:flex;align-items:center;gap:6px;margin-left:auto}
.cf-year-input label{font-size:var(--fs-xs);color:#8e8e93}
.cf-year-input input{width:60px;padding:5px 8px;border:1px solid #d6d2cb;border-radius:7px;font-size:var(--fs-sm);text-align:center;background:#f5f2ed;color:#0055cc;font-weight:600;-moz-appearance:textfield}
.cf-year-input input:focus{outline:none;border-color:#ff6b35;background:white}
.cf-year-input input::-webkit-inner-spin-button,.cf-year-input input::-webkit-outer-spin-button{-webkit-appearance:none}

.cf-big-val{font-size:clamp(28px,4vw,42px);font-weight:700;letter-spacing:-.5px;line-height:1.1}
.cf-big-label{font-size:var(--fs-sm);color:#8e8e93;margin-top:4px}
.cf-big-box{background:white;border-radius:var(--radius);border:2px solid;padding:var(--pad) clamp(14px,1.6vw,22px);text-align:center}
.cf-big-box.green{border-color:#86efac;background:#f0faf1}
.cf-big-box.green .cf-big-val{color:#166534}
.cf-big-box.yellow{border-color:#fde047;background:#fefce8}
.cf-big-box.yellow .cf-big-val{color:#854d0e}
.cf-big-box.red{border-color:#fca5a5;background:#fff1f2}
.cf-big-box.red .cf-big-val{color:#9f1239}

.cf-flow{background:white;border-radius:var(--radius);border:1px solid #e0dcd6;overflow:hidden}
.cf-flow-row{display:flex;align-items:center;padding:10px var(--pad);border-bottom:1px solid #f7f5f2;gap:10px;font-size:var(--fs-sm)}
.cf-flow-row:last-child{border-bottom:none}
.cf-flow-row.cf-total{font-weight:600;font-size:var(--fs-md)}
.cf-flow-label{flex:1;color:#3a3a3c}
.cf-flow-val{font-weight:500;white-space:nowrap;min-width:90px;text-align:right}
.cf-flow-row.cf-total .cf-flow-label{color:#2c2c2e}
.cf-flow-bar-wrap{width:120px;flex-shrink:0;height:6px;background:#f0ede8;border-radius:3px;overflow:hidden}
.cf-flow-bar{height:100%;border-radius:3px;transition:width .3s}
.cf-sign-pos{color:#1a7f37}.cf-sign-neg{color:#b91c1c}
.cf-indent{padding-left:14px;opacity:.85}
.cf-separator{height:1px;background:#e0dcd6;margin:2px 0}

.cf-assumptions{background:white;border-radius:var(--radius);border:1px solid #e0dcd6;padding:var(--pad)}
.cf-ass-title{font-size:var(--fs-xs);font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.cf-ass-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cf-ass-item{text-align:center;padding:8px 6px;background:#f5f2ed;border-radius:8px}
.cf-ass-val{font-size:var(--fs-md);font-weight:700;color:#2c2c2e}
.cf-ass-lbl{font-size:var(--fs-xs);color:#8e8e93;margin-top:2px}
</style>

<div class="shell">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Immobilien Kalkulation</span>
      <span class="topbar-obj" id="obj-name"></span>
    </div>
    <div class="tab-bar">
      <div class="tab active" onclick="showTab('eingaben',this)">Input</div>
      <div class="tab" onclick="showTab('cashflow',this)">Cashflow</div>
      <div class="tab" onclick="showTab('finanzierung',this)">Finanzierung</div>
      <div class="tab" onclick="showTab('cockpit',this)">Cockpit</div>
    </div>
  </div>
  <div class="content">
    <div id="tab-eingaben"></div>
    <div id="tab-cashflow" style="display:none"></div>
    <div id="tab-finanzierung" style="display:none"></div>
    <div id="tab-cockpit" style="display:none"></div>
  </div>
</div>

<script>
const S={
  adresse:'',kaufjahr:2025,kaufpreis:200000,wohnflaeche:60,anfInvest:0,
  makler:3.57,notar:2.0,grunderwerb:6.5,
  mietePqm:8,mietausfall:3,ruecklage:1,
  hausgeldN:null,grundsteuer:null,
  darlehenPct:90,zinssatz:3.5,tilgung:2,
  afa:2,gebaude:75,steuer:42,
  wertst:2,mietst:2,kostst:2,betrjahr:2050
};
let cfJahr=1;

const KINFO={
  bm:{title:'Bruttomietrendite',desc:'Verhältnis der jährlichen Kaltmiete zum Kaufpreis.',scale:[{c:'g',lbl:'Gut: über 6 %'},{c:'y',lbl:'Ok: 5 – 6 %'},{c:'r',lbl:'Kritisch: unter 5 %'}]},
  nm:{title:'Nettomietrendite',desc:'Bruttomietrendite nach Abzug aller Bewirtschaftungskosten.',scale:[{c:'g',lbl:'Gut: über 5 %'},{c:'y',lbl:'Ok: 4 – 5 %'},{c:'r',lbl:'Kritisch: unter 4 %'}]},
  fakt:{title:'Kaufpreisfaktor',desc:'Kaufpreis ÷ Jahreskaltmiete. Niedrigerer Faktor = besseres Geschäft.',scale:[{c:'g',lbl:'Gut: unter 20x'},{c:'y',lbl:'Ok: 20 – 25x'},{c:'r',lbl:'Teuer: über 25x'}]},
  cfo:{title:'Cashflow operativ',desc:'Monatlicher Überschuss aus Miete minus Bewirtschaftung, Zinsen und Tilgung — vor Steuereffekten.',scale:[{c:'g',lbl:'Gut: über +100 €/Mo.'},{c:'y',lbl:'Ok: 0 – +100 €/Mo.'},{c:'r',lbl:'Kritisch: negativ'}]},
  cfn:{title:'Cashflow nach Steuern',desc:'Tatsächlicher monatlicher Über- oder Unterschuss nach allen Kosten inkl. Steuer.',scale:[{c:'g',lbl:'Gut: über +100 €/Mo.'},{c:'y',lbl:'Ok: 0 – +100 €/Mo.'},{c:'r',lbl:'Kritisch: negativ'}]},
  afa:{title:'Monatliche AfA',desc:'Steuerliche Abschreibung auf den Gebäudeanteil. Kein Geldfluss, aber steuerlich absetzbar.',scale:[{c:'g',lbl:'Je höher, desto mehr Steuerersparnis'},{c:'y',lbl:'Hängt von Kaufpreis & Gebäudeanteil ab'},{c:'r',lbl:'Kein Negativ-Wert'}]}
};
function kTip(key){
  const d=KINFO[key];if(!d)return'';
  const rows=d.scale.map(r=>`<div class="kt-row"><div class="kt-dot ${r.c}"></div><span class="kt-rowlbl">${r.lbl}</span></div>`).join('');
  return`<div class="ktooltip"><div class="kt-title">${d.title}</div><div class="kt-desc">${d.desc}</div><div class="kt-scale">${rows}</div></div>`;
}

function autoHausgeld(){return Math.round(S.wohnflaeche*1.0)}
function autoGrundsteuer(){return Math.round(S.wohnflaeche*0.9)}
function getHG(){return S.hausgeldN!==null?S.hausgeldN:autoHausgeld()}
function getGS(){return S.grundsteuer!==null?S.grundsteuer:autoGrundsteuer()}

const GROUPS=[
  {id:'g0',icon:'🏠',title:'Objekt',fields:[
    {k:'adresse',l:'Adresse',t:'text',info:'Name oder Adresse des Objekts.',std:'z.B. Mülheim, 3-Zi-Wohnung'},
    {k:'kaufpreis',l:'Kaufpreis',u:'€',step:1000,info:'Kaufpreis laut Kaufvertrag, ohne Nebenkosten.',std:'150.000 – 500.000 €'},

const p=v=>v/100;
function ann(d,z,t){if(d<=0)return{rate:0,zinsen:0,tilgung:0};const zm=z/12,r=d*(zm+t/12),zi=d*zm,ti=r-zi;return{rate:r,zinsen:zi,tilgung:ti}}
function tilgP(d,z,t,j=50){if(d<=0)return[];const zm=z/12,r=d*(zm+t/12);let rs=d;const pl=[];for(let i=1;i<=j;i++){let zj=0,tj=0;for(let m=0;m<12;m++){if(rs<=0)break;const zi=rs*zm,ti=Math.min(r-zi,rs);zj+=zi;tj+=ti;rs-=ti;}pl.push({j:i,zj,tj,ann:zj+tj,rs:Math.max(0,rs),kdm:(zj+tj)/12});if(rs<=0)break;}return pl}

function calcAll(){
  const kp=S.kaufpreis,wf=S.wohnflaeche;
  const nkGes=kp*(p(S.makler)+p(S.notar)+p(S.grunderwerb));
  const nkObj={makler:kp*p(S.makler),notar:kp*p(S.notar),grunderwerb:kp*p(S.grunderwerb),gesamt:nkGes};
  const gI=kp+nkGes+S.anfInvest,dar=kp*p(S.darlehenPct),ek=gI-dar;
  const fin=ann(dar,p(S.zinssatz),p(S.tilgung));
  const nkm=S.mietePqm*wf,mao=nkm*p(S.mietausfall),nkmE=nkm-mao;
  const hg=getHG(),gs=getGS();
  const bk=hg+gs+(S.ruecklage*wf/12)+mao;
  const afaM=(kp*p(S.gebaude)*p(S.afa))/12,zvs=nkmE-bk-fin.zinsen-afaM,stM=zvs*p(S.steuer);
  const cfOp=nkmE-bk-fin.zinsen-fin.tilgung,cfNSt=cfOp-stM;
  const bR=kp>0?(nkm*12)/kp:0,nR=gI>0?((nkmE-bk)*12)/gI:0,fakt=nkm>0?kp/(nkm*12):0;
  const tplan=tilgP(dar,p(S.zinssatz),p(S.tilgung),50);
  return{nkObj,nkGes,gI,dar,ek,fin,nkm,mao,nkmE,bk,hg,gs,afaM,stM,cfOp,cfNSt,bR,nR,fakt,tplan};
}

function calcJahr(j){
  const kp=S.kaufpreis,wf=S.wohnflaeche;
  const idx=j-1;
  const fakt_m=Math.pow(1+p(S.mietst),idx);
  const fakt_k=Math.pow(1+p(S.kostst),idx);
  const nkm0=S.mietePqm*wf;
  const nkm=nkm0*fakt_m;
  const mao=nkm*p(S.mietausfall);
  const nkmE=nkm-mao;
  const hg0=getHG(),gs0=getGS();
  const bk=hg0*fakt_k+gs0*fakt_k+(S.ruecklage*wf/12)*fakt_k+mao;
  const dar=kp*p(S.darlehenPct);
  const tplan=tilgP(dar,p(S.zinssatz),p(S.tilgung),50);
  const tp=tplan[idx]||{zj:0,tj:0,rs:0};
  const zi=tp.zj/12,ti=tp.tj/12;
  const afaM=(kp*p(S.gebaude)*p(S.afa))/12;
  const zvs=nkmE-bk-zi-afaM;
  const stM=zvs*p(S.steuer);
  const cfOp=nkmE-bk-zi-ti;
  const cfNSt=cfOp-stM;
  const immowert=kp*Math.pow(1+p(S.wertst),idx);
  return{j,nkm,mao,nkmE,bk,hg:hg0*fakt_k,gs:gs0*fakt_k,ruecKosten:(S.ruecklage*wf/12)*fakt_k,zi,ti,afaM,zvs,stM,cfOp,cfNSt,immowert,rs:tp.rs};
}

const eu=v=>new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(v);
const pf=(v,d=2)=>(v*100).toFixed(d)+'%';
const n2=v=>new Intl.NumberFormat('de-DE',{maximumFractionDigits:1}).format(v);
function amp(v,sw){return v>=sw[0]?'kg':v>=sw[1]?'ky':'kr'}
const SW={bm:[0.06,0.05],nm:[0.05,0.04],cf:[100,0],fk:[20,25]};
function famp(v){return v<=SW.fk[0]?'kg':v<=SW.fk[1]?'ky':'kr'}
const ALBL={kg:'Gut',ky:'Ok',kr:'Kritisch'};
const ACOL={kg:'#1a7f37',ky:'#856404',kr:'#b91c1c'};

function secH(icon,title){
  return`<div class="sec-header"><div class="sec-header-icon" style="background:#ff6b3518">${icon}</div><span class="sec-title">${title}</span></div>`;
}
function drow(l,v,bold=false){return`<div class="drow${bold?' drow-bold':''}"><span class="dl">${l}</span><span class="dv">${v}</span></div>`}
function cfr2(l,v){return`<div class="cfr"><span>${l}</span><span class="${v>=0?'gv':'rv'}">${eu(v)}</span></div>`}
function cfrt(l,v,a){return`<div class="cfr cft" style="background:${a==='kg'?'#f0faf1':a==='ky'?'#fffbeb':'#fef2f2'}"><span>${l}</span><span style="color:${ACOL[a]}">${eu(v)}</span></div>`}
function kc(l,v,a,s,k){
  return`<div class="kcard"><div class="kcard-top"><span class="kbadge ${a}">${ALBL[a]}</span><button class="kinfo-btn">i${kTip(k)}</button></div><div class="kcard-label">${l}</div><div class="kcard-val" style="color:${ACOL[a]}">${v}</div>${s?`<div class="kcard-sub">${s}</div>`:''}</div>`;
}

function buildFazit(c){
  const sc={g:0,y:0,r:0};
  const inc=a=>{if(a==='kg')sc.g++;else if(a==='ky')sc.y++;else sc.r++};
  inc(amp(c.bR,SW.bm));inc(amp(c.nR,SW.nm));inc(famp(c.fakt));inc(amp(c.cfOp,SW.cf));inc(amp(c.cfNSt,SW.cf));
  const pts=[
    c.bR>=0.06?{p:true,t:`Bruttomietrendite ${pf(c.bR)} — über 6 %`}:c.bR>=0.05?{p:null,t:`Bruttomietrendite ${pf(c.bR)} — mittlerer Bereich`}:{p:false,t:`Bruttomietrendite ${pf(c.bR)} — unter 5 %`},
    c.fakt<=20?{p:true,t:`Kaufpreisfaktor ${n2(c.fakt)}x — günstig bewertet`}:c.fakt<=25?{p:null,t:`Kaufpreisfaktor ${n2(c.fakt)}x — marktüblich`}:{p:false,t:`Kaufpreisfaktor ${n2(c.fakt)}x — teuer bewertet`},
    c.cfNSt>=100?{p:true,t:`Cashflow ${eu(c.cfNSt)}/Mo. nach Steuern — positiv`}:c.cfNSt>=0?{p:null,t:`Cashflow ${eu(c.cfNSt)}/Mo. — nahezu neutral`}:{p:false,t:`Negativer Cashflow ${eu(c.cfNSt)}/Mo.`},
  ];
  const ekP=c.ek/(c.gI||1);
  pts.push(ekP>=0.2?{p:true,t:`Eigenkapitalanteil ${pf(ekP)} — solide Basis`}:ekP>=0.1?{p:null,t:`Eigenkapitalanteil ${pf(ekP)} — knapp kalkuliert`}:{p:false,t:`Eigenkapitalanteil ${pf(ekP)} — hohes Finanzierungsrisiko`});
  let cls,icon,verd,summ;
  if(sc.g>=3&&sc.r===0){cls='green';icon='✅';verd='Interessantes Objekt';summ='Die Kennzahlen zeigen ein renditestarkes Investment mit positivem Cashflow.';}
  else if(sc.r>=3){cls='red';icon='❌';verd='Nicht empfehlenswert';summ='Mehrere kritische Kennzahlen — Rendite, Cashflow oder Bewertung sind unattraktiv.';}
  else if(sc.g>=2&&sc.r<=1){cls='green';icon='✅';verd='Tendenziell interessant';summ='Überwiegend gute Kennzahlen mit einzelnen Schwächen.';}
  else if(sc.r>=2){cls='red';icon='⚠️';verd='Eher nicht empfehlenswert';summ='Mehrere Kennzahlen sind kritisch.';}
  else{cls='yellow';icon='📊';verd='Durchschnittliches Objekt';summ='Die Kennzahlen sind gemischt — weder besonders attraktiv noch offensichtlich ungeeignet.';}
  const ptH=pts.map(pt=>`<div class="fazit-point"><div class="fp-dot" style="background:${pt.p===true?'#22c55e':pt.p===false?'#f43f5e':'#eab308'}"></div><span>${pt.t}</span></div>`).join('');
  return`<div class="fazit ${cls}"><div class="fazit-icon">${icon}</div><div class="fazit-body"><div class="fazit-verdict">${verd}</div><div class="fazit-summary">${summ}</div><div class="fazit-points">${ptH}</div></div></div>`;
}

function toggleTP(){tplanOpen=!tplanOpen;const el=document.getElementById('tplan-acc');if(el)el.classList.toggle('open',tplanOpen);}

function buildCockpit(c){
  const bma=amp(c.bR,SW.bm),nma=amp(c.nR,SW.nm),cfa=amp(c.cfOp,SW.cf),cfna=amp(c.cfNSt,SW.cf),fa=famp(c.fakt);
  return`${buildFazit(c)}
<div style="display:grid;grid-template-columns:1fr clamp(220px,22vw,290px);gap:var(--gap);margin-bottom:var(--gap);align-items:start">
  <div>${secH('📊','Kennzahlen')}<div class="kgrid">
    ${kc('Bruttomietrendite',pf(c.bR),bma,'Kaltmiete / KP','bm')}
    ${kc('Nettomietrendite',pf(c.nR),nma,'nach Bewirt.','nm')}
    ${kc('Kaufpreisfaktor',n2(c.fakt)+'x',fa,'KP / Jahreskaltmiete','fakt')}
    ${kc('Cashflow operativ',eu(c.cfOp)+'/Mo.',cfa,'vor Steuern','cfo')}
    ${kc('Cashflow n. Steuern',eu(c.cfNSt)+'/Mo.',cfna,'nach AfA & Steuern','cfn')}
    ${kc('Monatl. AfA',eu(c.afaM),'kg','steuerl. Abschreibung','afa')}
  </div></div>
  <div>${secH('💶','Monatlicher Cashflow')}<div class="cf-box">
    ${cfr2('Nettokaltmiete',c.nkmE)}${cfr2('– Bewirtschaftung',-c.bk)}${cfr2('– Zinsen',-c.fin.zinsen)}${cfr2('– Tilgung',-c.fin.tilgung)}
    ${cfrt('= Cashflow operativ',c.cfOp,cfa)}${cfr2('– Steuern',-c.stM)}
    ${cfrt('= Cashflow n. Steuern',c.cfNSt,cfna)}
  </div></div>
</div>
<div class="sec-divider"></div>
${secH('📋','Übersicht')}
<div class="grid-3" style="margin-bottom:var(--gap)">
  <div class="card"><div class="card-header"><span class="card-header-icon">🏠</span><span class="card-title">Investition</span></div><div class="card-body">
    ${drow('Kaufpreis',eu(S.kaufpreis))}${drow('Kaufnebenkosten',eu(c.nkGes))}${drow('Anfängl. Invest.',eu(S.anfInvest))}${drow('Gesamtinvestition',eu(c.gI),true)}${drow('Kaufpreis/m²',eu(S.kaufpreis/(S.wohnflaeche||1)))}
  </div></div>
  <div class="card"><div class="card-header"><span class="card-header-icon">🏷️</span><span class="card-title">Miete & Bewirtschaftung</span></div><div class="card-body">
    ${drow('Kaltmiete/m²',S.mietePqm.toFixed(2)+' €')}${drow('Nettokaltmiete',eu(c.nkm)+'/Mo.')}${drow('– Mietausfall','–'+eu(c.mao)+'/Mo.')}${drow('Nettokaltmiete eff.',eu(c.nkmE)+'/Mo.',true)}${drow('Bewirtschaftung','–'+eu(c.bk)+'/Mo.')}
  </div></div>
  <div class="card"><div class="card-header"><span class="card-header-icon">🏦</span><span class="card-title">Finanzierung</span></div><div class="card-body">
    ${drow('Darlehen',eu(c.dar))}${drow('Eigenkapital',eu(c.ek),true)}${drow('EK-Anteil',pf(c.ek/(c.gI||1)))}${drow('Kapitaldienst',eu(c.fin.rate)+'/Mo.',true)}${drow('davon Zinsen',eu(c.fin.zinsen)+'/Mo.')}${drow('davon Tilgung',eu(c.fin.tilgung)+'/Mo.')}
  </div></div>
</div>
<div class="disclaimer">Keine Gewähr für Richtigkeit. Kein Ersatz für Rechts-, Steuer- oder Finanzberatung.</div>`;
}

function buildFin(c){
  const vollJ=c.tplan.length>0?S.kaufjahr+c.tplan[c.tplan.length-1].j-1:'—';
  const gZ=c.tplan.reduce((s,r)=>s+r.zj,0);
  let rows='';
  c.tplan.forEach(r=>{const paid=r.rs<=0;rows+=`<tr class="${paid?'done-row':''}"><td>${S.kaufjahr+r.j-1}</td><td>${eu(r.zj)}</td><td>${eu(r.tj)}</td><td>${eu(r.ann)}</td><td>${paid?'✓ abbezahlt':eu(r.rs)}</td><td>${eu(r.kdm)}</td></tr>`;});
  return`${secH('🏦','Finanzierungsübersicht')}
<div class="grid-2" style="margin-bottom:var(--gap)">
  <div class="card"><div class="card-header"><span class="card-header-icon">📄</span><span class="card-title">Darlehen</span></div><div class="card-body">
    ${drow('Darlehenssumme',eu(c.dar))}${drow('Zinssatz',pf(p(S.zinssatz)))}${drow('Anfäng. Tilgung',pf(p(S.tilgung)))}${drow('Monatl. Rate',eu(c.fin.rate),true)}${drow('davon Zinsen',eu(c.fin.zinsen))}${drow('davon Tilgung',eu(c.fin.tilgung))}
  </div></div>
  <div class="card"><div class="card-header"><span class="card-header-icon">💰</span><span class="card-title">Eigenkapital & Gesamtinvestition</span></div><div class="card-body">
    ${drow('Kaufpreis',eu(S.kaufpreis))}${drow('Nebenkosten',eu(c.nkGes))}${drow('Anfängl. Invest.',eu(S.anfInvest))}${drow('Gesamtinvestition',eu(c.gI),true)}${drow('Eigenkapital',eu(c.ek),true)}${drow('EK-Anteil',pf(c.ek/(c.gI||1)))}
  </div></div>
  <div class="card"><div class="card-header"><span class="card-header-icon">📋</span><span class="card-title">Kaufnebenkosten</span></div><div class="card-body">
    ${drow('Makler',eu(c.nkObj.makler))}${drow('Notar & Grundbuch',eu(c.nkObj.notar))}${drow('Grunderwerbsteuer',eu(c.nkObj.grunderwerb))}${drow('Summe',eu(c.nkGes),true)}${drow('in % des Kaufpreises',pf(c.nkGes/(S.kaufpreis||1)))}
  </div></div>
  <div class="card"><div class="card-header"><span class="card-header-icon">📊</span><span class="card-title">Steuern & AfA</span></div><div class="card-body">
    ${drow('AfA-Satz',pf(p(S.afa)))}${drow('Gebäudeanteil',pf(p(S.gebaude)))}${drow('Monatl. AfA',eu(c.afaM))}${drow('Grenzsteuersatz',pf(p(S.steuer)))}${drow('Monatl. Steuern',eu(c.stM),true)}
  </div></div>
</div>
<div class="sec-divider"></div>
${secH('📅','Tilgungsplan')}
<div class="accordion${tplanOpen?' open':''}" id="tplan-acc">
  <div class="accordion-header" onclick="toggleTP()">
    <div class="accordion-icon">📅</div>
    <span class="accordion-title">Jahresübersicht</span>
    <div class="accordion-meta"><span>Volltilgung: <strong>${vollJ}</strong></span><span>Gesamt-Zinsen: <strong>${eu(gZ)}</strong></span><span>Laufzeit: <strong>${c.tplan.length} Jahre</strong></span></div>
    <span class="accordion-chevron">▾</span>
  </div>
  <div class="accordion-body"><div class="accordion-inner"><div style="overflow-x:auto">
    <table class="tbl"><thead><tr><th>Jahr</th><th>Zinsen p.a.</th><th>Tilgung p.a.</th><th>Annuität p.a.</th><th>Restschuld (Ende)</th><th>Rate / Monat</th></tr></thead><tbody>${rows}</tbody></table>
  </div></div></div>
</div>
<div class="disclaimer">Keine Gewähr für Richtigkeit. Kein Ersatz für Rechts-, Steuer- oder Finanzberatung.</div>`;
}

let activeTab='eingaben';
function showTab(id,el){
  activeTab=id;
  ['eingaben','cashflow','finanzierung','cockpit'].forEach(t=>document.getElementById('tab-'+t).style.display=t===id?'block':'none');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTab(id);
}
function renderTab(id){
  const c=calcAll();
  if(id==='cockpit')document.getElementById('tab-cockpit').innerHTML=buildCockpit(c);
  else if(id==='finanzierung')document.getElementById('tab-finanzierung').innerHTML=buildFin(c);
  else if(id==='cashflow')document.getElementById('tab-cashflow').innerHTML=buildCashflow();
  else if(id==='eingaben')document.getElementById('tab-eingaben').innerHTML=buildEingaben();
}
renderTab('eingaben');
</script>
